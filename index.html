<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Assistant relevé cuisine - V0.6 A4 guidage</title>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--ink:#142033;--muted:#657187;--line:#dce5f2;--blue:#2463ff;--blue2:#eaf0ff;--green:#119c63;--green2:#e8f8f0;--orange:#f59e0b;--orange2:#fff7e6;--red:#d92d20;--red2:#fff0ed;--dark:#10213f;--shadow:0 14px 34px rgba(20,32,51,.10);--r:22px}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#edf4ff 0,var(--bg) 320px);color:var(--ink)}
    header{position:sticky;top:0;z-index:50;background:rgba(245,247,251,.94);backdrop-filter:blur(14px);border-bottom:1px solid rgba(220,229,242,.92)}
    .top{max-width:1050px;margin:auto;padding:12px 14px}.title{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.title h1{font-size:18px;margin:0;letter-spacing:-.02em}.ver{font-size:11px;font-weight:900;color:var(--blue);white-space:nowrap}.sub{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.3}.progress{height:10px;background:#e6edf8;border-radius:999px;overflow:hidden;margin-top:10px}.progress div{height:100%;width:0;background:linear-gradient(90deg,var(--blue),#14b8a6);transition:.25s}
    main{max-width:1050px;margin:18px auto 96px;padding:0 14px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:18px}.kicker{display:inline-flex;background:var(--blue2);color:#0d3ec9;border:1px solid #c8d6ff;border-radius:999px;padding:7px 11px;font-size:12px;font-weight:900;margin-bottom:10px}h2{font-size:26px;margin:0;letter-spacing:-.03em}.lead{color:var(--muted);line-height:1.45;margin:8px 0 0}.big{background:var(--dark);color:white;border-radius:20px;padding:18px;margin:16px 0;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center}.big .ico{font-size:44px}.big b{display:block;font-size:19px;margin-bottom:4px}.big span{display:block;color:#cfdaee;line-height:1.42}
    button{border:0;border-radius:999px;padding:13px 16px;background:var(--ink);color:white;font-weight:900;cursor:pointer;box-shadow:0 8px 18px rgba(20,32,51,.15);font-size:15px}button.secondary{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:none}button.blue{background:var(--blue)}button.green{background:var(--green)}button.red{background:var(--red)}button.orange{background:var(--orange);color:#2b1b00}button.small{padding:8px 10px;border-radius:12px;font-size:12px;box-shadow:none}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}.c12{grid-column:span 12}.c8{grid-column:span 8}.c6{grid-column:span 6}.c4{grid-column:span 4}.c3{grid-column:span 3}.c2{grid-column:span 2}
    label{display:block;margin:0 0 6px;color:#344054;font-weight:900;font-size:12px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:15px;padding:13px 12px;background:#fff;color:var(--ink);font:inherit;outline:none}textarea{min-height:96px;resize:vertical;line-height:1.45}input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(31,94,255,.10)}
    .hint{background:#f8fbff;border:1px dashed #c8d5ea;color:#40506a;border-radius:16px;padding:13px 14px;line-height:1.45;font-size:14px}.warn{background:var(--red2);border-color:#ffc9c1;color:#8b2117}.ok{background:var(--green2);border-color:#bfe8d2;color:#086b43}.orangeBox{background:var(--orange2);border-color:#ffe0a3;color:#765000}.blueBox{background:var(--blue2);border-color:#c8d6ff;color:#0d3ec9}
    .checks{display:grid;grid-template-columns:1fr;gap:10px}.check{border:1px solid var(--line);background:white;border-radius:18px;padding:14px;display:flex;gap:12px;cursor:pointer}.check input{width:auto;margin-top:4px}.check b{display:block}.check small{display:block;color:var(--muted);line-height:1.35;margin-top:4px}.check.on{background:var(--green2);border-color:#a7e0c2}
    .photoBox{display:grid;grid-template-columns:1fr;gap:14px}.stage{min-height:410px;background:#eef3fb;border:1px dashed #b9c7da;border-radius:20px;overflow:hidden;position:relative;display:grid;place-items:center;touch-action:manipulation}.stage img{width:100%;height:100%;max-height:560px;object-fit:contain;background:#e9eef6;display:block}.empty{text-align:center;color:#657187;font-weight:900;padding:26px;line-height:1.35}.overlay{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none}.pt{position:absolute;transform:translate(-50%,-50%);width:36px;height:36px;border-radius:50%;display:grid;place-items:center;border:3px solid white;color:white;font-size:12px;font-weight:900;box-shadow:0 7px 18px rgba(0,0,0,.30);cursor:pointer}.dep{background:#16a34a}.r1{background:#2563eb}.r2{background:#7c3aed}.fin{background:#111827}.cache{background:#dc2626}.a4{background:#0891b2}.measure{background:#f59e0b;color:#261700}.tech{background:#64748b}.evac{background:#d92d20}.water{background:#06b6d4}.elec{background:#7c3aed}.window{background:#14b8a6}.door{background:#795548}
    .tools{display:grid;grid-template-columns:1fr 1fr;gap:8px}.tools button{background:white;color:var(--ink);border:1px solid var(--line);box-shadow:none;text-align:left;border-radius:14px;font-size:13px;padding:10px}.tools button.active{background:var(--blue);color:white;border-color:var(--blue)}.panel{border:1px solid var(--line);border-radius:18px;background:#fbfdff;padding:14px}.panel h3{font-size:16px;margin:0 0 10px}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{background:white!important;color:var(--ink)!important;border:1px solid var(--line)!important;box-shadow:none!important}.tab.active{background:var(--blue)!important;color:white!important;border-color:var(--blue)!important}.tab.done{border-color:#a7e0c2!important;background:var(--green2)!important;color:#0b6b43!important}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}.stat{background:white;border:1px solid var(--line);border-radius:16px;padding:12px}.stat span{display:block;color:var(--muted);font-size:12px;font-weight:800}.stat b{font-size:20px}.tag{display:inline-flex;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900}.tag.green{background:var(--green2);color:var(--green);border:1px solid #bfe8d2}.tag.orange{background:var(--orange2);color:#8a5b00;border:1px solid #ffe0a3}.tag.red{background:var(--red2);color:var(--red);border:1px solid #ffc9c1}.tag.blue{background:var(--blue2);color:#0d3ec9;border:1px solid #c8d6ff}
    .bottomNav{position:fixed;left:0;right:0;bottom:0;z-index:60;background:rgba(245,247,251,.95);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:10px 12px calc(10px + env(safe-area-inset-bottom));display:flex;gap:8px;justify-content:center}.bottomNav button{min-width:110px}.bottomNav .mainBtn{flex:1;max-width:360px}.inlineActions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.mini{display:flex;flex-direction:column;gap:8px;max-height:280px;overflow:auto}.item{display:flex;justify-content:space-between;gap:8px;border:1px solid var(--line);border-radius:14px;background:white;padding:10px}.item strong{font-size:13px}.item small{display:block;color:var(--muted);line-height:1.35;margin-top:3px}
    .segments{display:flex;flex-direction:column;gap:8px}.seg{display:grid;grid-template-columns:1fr 120px auto;gap:8px;align-items:end;background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px}.plan{min-height:330px;border:1px solid var(--line);border-radius:20px;background:linear-gradient(45deg,#fff,#f8fbff);display:grid;place-items:center;overflow:hidden}.facades{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}table{width:100%;border-collapse:separate;border-spacing:0 8px}th{text-align:left;color:var(--muted);font-size:12px;padding:0 8px}td{background:#f9fbfe;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:8px}td:first-child{border-left:1px solid var(--line);border-radius:13px 0 0 13px}td:last-child{border-right:1px solid var(--line);border-radius:0 13px 13px 0}
    .reportSheet{max-width:980px;margin:auto;border:1px solid #e5e7eb;border-radius:18px;overflow:hidden;background:white}.reportTitle{padding:22px;background:#10213f;color:white}.reportTitle h2{font-size:26px;margin:0}.reportTitle p{color:#cdd7ea;margin:5px 0 0}.reportBody{padding:22px;display:flex;flex-direction:column;gap:16px}.reportGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.reportBlock{border:1px solid #e5e7eb;border-radius:14px;padding:14px;background:white}.reportBlock h3{margin:0 0 10px;color:#10213f}.kv{display:grid;grid-template-columns:160px 1fr;gap:6px 10px;font-size:14px}.kv b{color:#4b5563}.reportBlock ul{margin:0;padding-left:20px}.reportBlock li{margin:4px 0;line-height:1.35}.reportPhotos{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.reportPhotos img{width:100%;max-height:260px;object-fit:contain;border:1px solid #e5e7eb;border-radius:12px;background:#f3f4f6}
    .loader{display:none;position:fixed;inset:0;z-index:100;background:rgba(16,33,63,.62);place-items:center;color:white;font-weight:900}.loader.on{display:grid}.spin{width:44px;height:44px;border:5px solid rgba(255,255,255,.35);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}@keyframes spin{to{transform:rotate(360deg)}}
    @media(min-width:900px){.photoBox{grid-template-columns:1.1fr .9fr}.checks{grid-template-columns:1fr 1fr}.title h1{font-size:20px}}
    @media(max-width:760px){main{margin-top:12px;padding:0 10px}.card{padding:15px;border-radius:20px}h2{font-size:24px}.big{padding:15px}.big .ico{font-size:36px}.c8,.c6,.c4,.c3,.c2{grid-column:span 12}.stats{grid-template-columns:1fr}.facades,.reportGrid,.reportPhotos{grid-template-columns:1fr}.stage{min-height:350px}.tools{grid-template-columns:1fr}.reportBody{padding:14px}.kv{grid-template-columns:1fr}.bottomNav button{min-width:88px;padding:12px 10px}.seg{grid-template-columns:1fr}}
    @media print{body{background:white}header,.bottomNav,.noPrint,.loader{display:none!important}main{display:block;max-width:none;margin:0;padding:0}.card{box-shadow:none;border:0;padding:0}.reportSheet{max-width:none;border:0;border-radius:0}.reportTitle{background:#10213f!important;color:white!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}}
  </style>
</head>
<body>
<header><div class="top"><div class="title"><div><h1>Assistant relevé cuisine <span class="ver">V0.6 A4 guidage</span></h1><div class="sub" id="stepSub">Repères A4 physiques + photo suivante + segments</div></div><div class="noPrint"><button class="secondary small" onclick="saveLocal()">Sauver</button><button class="secondary small" onclick="exportJSON()">JSON</button><button class="red small" onclick="resetAll()">Reset</button></div></div><div class="progress"><div id="bar"></div></div></div></header>
<main><section class="card" id="app"></section></main>
<div class="bottomNav noPrint"><button class="secondary" onclick="prev()">← Retour</button><button class="blue mainBtn" onclick="nextAction()" id="nextBtn">Continuer →</button></div>
<div class="loader" id="loader"><div><div class="spin"></div><div>Compression de la photo...</div></div></div>
<script>
const VERSION='V0.6-A4-guidage';
const STORAGE='cbat_releve_cuisine_a4_v06';
const MAX_IMAGE=1600;
const QUALITY=.72;
const steps=['Dossier','Mode A4','Mur A','Mur B','Mur C','Mur D','Technique','Validation','Rapport'];
const parts={p1:'Photo 1',p2:'Photo 2',p3:'Photo 3',detail:'Détail'};
const tools={
  DEP:{l:'Feuille DEP',i:'DEP',c:'dep',group:'repere'},R1:{l:'Feuille R1',i:'R1',c:'r1',group:'repere'},R2:{l:'Feuille R2',i:'R2',c:'r2',group:'repere'},FIN:{l:'Feuille FIN',i:'FIN',c:'fin',group:'repere'},CACHE:{l:'Feuille CACHÉ',i:'?',c:'cache',group:'repere'},
  A4A:{l:'A4A début grand côté',i:'A4A',c:'a4',group:'mesure'},A4B:{l:'A4B fin grand côté',i:'A4B',c:'a4',group:'mesure'},M1:{l:'M1 début distance visible',i:'M1',c:'measure',group:'mesure'},M2:{l:'M2 fin distance visible',i:'M2',c:'measure',group:'mesure'},
  EVAC:{l:'Évacuation',i:'EV',c:'evac',group:'tech'},EAU:{l:'Arrivée eau',i:'EAU',c:'water',group:'tech'},ELEC:{l:'Prise / élec.',i:'⚡',c:'elec',group:'tech'},FEN:{l:'Fenêtre',i:'F',c:'window',group:'tech'},PORTE:{l:'Porte',i:'P',c:'door',group:'tech'},TECH:{l:'Autre détail',i:'D',c:'tech',group:'tech'}
};
let state={step:0,tool:'DEP',activePart:'p1',project:{client:'',adresse:'',date:new Date().toISOString().slice(0,10),tech:'',etat:'Cuisine existante en place / encombrée',comment:''},prep:{sheets:false,marker:false,photos:false,hidden:false},walls:[],techPhotos:[],notes:'',reserve:''};
function newWall(i){return {name:String.fromCharCode(65+i),photoCount:'2',measureMode:'segments',photos:{p1:'',p2:'',p3:'',detail:''},points:[],manual:'',segments:[],final:'',angle:'90',confidence:'orange',validated:false,notes:''};}
function initWalls(){state.walls=Array.from({length:4},(_,i)=>newWall(i));}
initWalls();
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
const num=v=>{const x=parseFloat(String(v).replace(',','.'));return isFinite(x)?x:0};
function currentWall(){return state.walls[state.step-2]}
function requiredParts(w){if(w.photoCount==='1')return ['p1'];if(w.photoCount==='2')return ['p1','p2'];if(w.photoCount==='3')return ['p1','p2','p3'];return ['p1','detail']}
function partLabel(w,p){if(w.photoCount==='1')return p==='p1'?'Photo unique : DEP → FIN/CACHÉ':'Détail';if(w.photoCount==='2')return p==='p1'?'Photo 1 : DEP → R1':p==='p2'?'Photo 2 : R1 → FIN/CACHÉ':'Détail';if(w.photoCount==='3')return p==='p1'?'Photo 1 : DEP → R1':p==='p2'?'Photo 2 : R1 → R2':p==='p3'?'Photo 3 : R2 → FIN/CACHÉ':'Détail';return p==='p1'?'Zone visible / cachée':'Détail';}
function render(){document.getElementById('bar').style.width=Math.round(progress()*100)+'%';document.getElementById('stepSub').textContent=`Étape ${state.step+1}/9 - ${steps[state.step]}`;const a=$('app');if(state.step===0)a.innerHTML=screenInfo();if(state.step===1)a.innerHTML=screenPrep();if(state.step>=2&&state.step<=5)a.innerHTML=screenWall(state.step-2);if(state.step===6)a.innerHTML=screenTech();if(state.step===7)a.innerHTML=screenValidation();if(state.step===8)a.innerHTML=screenReport();bind();updateNextLabel();}
function progress(){let d=0;for(let i=0;i<8;i++)if(done(i))d++;return d/8}
function done(i){if(i===0)return !!state.project.client;if(i===1)return Object.values(state.prep).filter(Boolean).length>=3;if(i>=2&&i<=5){const w=state.walls[i-2];return requiredParts(w).some(p=>w.photos[p]) && (finalLen(w)||w.measureMode==='unknown')}if(i===6)return state.techPhotos.length>0;if(i===7)return state.walls.some(w=>w.validated)||state.walls.some(w=>finalLen(w));return false}
function go(i){state.step=Math.max(0,Math.min(8,i));render();scrollTo({top:0,behavior:'smooth'})}
function prev(){go(state.step-1)}
function nextAction(){if(state.step===8){window.print();return} if(state.step>=2&&state.step<=5){wallNextAction(state.step-2);return} if(state.step===7){go(8);return} go(state.step+1)}
function wallNextAction(i){const w=state.walls[i], req=requiredParts(w), idx=req.indexOf(state.activePart); if(idx>=0 && idx<req.length-1){state.activePart=req[idx+1];render();return} validateWall(i,true)}
function updateNextLabel(){const b=$('nextBtn');if(state.step===8)b.textContent='Imprimer / PDF';else if(state.step>=2&&state.step<=5){const w=currentWall(),req=requiredParts(w),idx=req.indexOf(state.activePart);b.textContent=(idx>=0&&idx<req.length-1)?'Photo suivante →':'Valider ce mur →'}else if(state.step===7)b.textContent='Générer rapport →';else b.textContent='Continuer →'}
function head(k,t,l){return `<div class="kicker">${k}</div><h2>${t}</h2><p class="lead">${l}</p>`}
function big(icon,title,text){return `<div class="big"><div class="ico">${icon}</div><div><b>${title}</b><span>${text}</span></div></div>`}
function screenInfo(){return `${head('ÉTAPE 1 / 9','Dossier chantier','On renseigne le minimum. Le reste se fait photo par photo avec les feuilles A4.')}${big('🧭','Méthode simplifiée','Une feuille A4 = un seul repère. DEP, R1, R2, FIN et CACHÉ sont des feuilles physiques. A4A/A4B/M1/M2 sont uniquement des points de mesure optionnels sur la photo.')}
<div class="grid"><div class="c4"><label>Client</label><input id="client" value="${esc(state.project.client)}" placeholder="Nom client"></div><div class="c4"><label>Adresse</label><input id="adresse" value="${esc(state.project.adresse)}" placeholder="Adresse chantier"></div><div class="c2"><label>Date</label><input id="date" type="date" value="${esc(state.project.date)}"></div><div class="c2"><label>Technicien</label><input id="tech" value="${esc(state.project.tech)}" placeholder="Nom"></div><div class="c4"><label>État de la pièce</label><select id="etat"><option ${state.project.etat==='Cuisine existante en place / encombrée'?'selected':''}>Cuisine existante en place / encombrée</option><option ${state.project.etat==='Cuisine vide'?'selected':''}>Cuisine vide</option><option ${state.project.etat==='Cuisine en cours de dépose'?'selected':''}>Cuisine en cours de dépose</option></select></div><div class="c8"><label>Commentaire départ</label><input id="comment" value="${esc(state.project.comment)}" placeholder="Ex : accès difficile, meubles en place..."></div></div><div class="inlineActions noPrint"><button class="secondary" onclick="loadLocal()">Recharger sauvegarde</button><button class="secondary" onclick="saveLocal()">Enregistrer</button><button class="secondary" onclick="exportJSON()">Exporter JSON</button></div>`}
function screenPrep(){const items=[['sheets','Préparer les feuilles','DEP, R1, R2, FIN, CACHÉ. Une feuille = un seul repère.'],['marker','Écrire en gros au feutre','Le texte doit être lisible sur la photo. Ajoute une flèche sur DEP et FIN.'],['photos','Photos de gauche à droite','Photo 1 : DEP → R1. Photo 2 : R1 → FIN. Si besoin Photo 3 : R1/R2/FIN.'],['hidden','Zone cachée','Si un obstacle cache le départ, la fin ou l’angle : poser CACHÉ et noter l’obstacle.']];return `${head('ÉTAPE 2 / 9','Préparer les feuilles A4','Pas de règle de 1 m. On utilise des feuilles A4, faciles à faire chez n’importe qui.')}${big('📄','Une feuille = un repère','DEP = départ du mur. R1 = raccord photo 1/photo 2. R2 = raccord photo 2/photo 3. FIN = fin visible. CACHÉ = obstacle ou angle masqué.')}
<div class="checks">${items.map(([k,t,d])=>`<label class="check ${state.prep[k]?'on':''}"><input type="checkbox" data-prep="${k}" ${state.prep[k]?'checked':''}><span><b>${t}</b><small>${d}</small></span></label>`).join('')}</div><div class="hint warn" style="margin-top:14px"><b>À retenir :</b> R1 et R2 ne mesurent rien. Ils servent seulement à raccorder les photos entre elles.</div>`}
function screenWall(i){const w=state.walls[i];return `${head(`ÉTAPE ${i+3} / 9`,`Mur ${w.name}`,'Choisis le nombre de photos, prends les photos, puis renseigne la longueur.')}${big('📸','On ne bloque plus sur une seule photo','Si le mur est long : photo 1 DEP→R1, photo 2 R1→FIN. Si très long : DEP→R1, R1→R2, R2→FIN.')}
<div style="display:flex;gap:10px;justify-content:space-between;align-items:center"><span class="tag ${w.confidence==='green'?'green':w.confidence==='red'?'red':'orange'}">${confText(w)}</span><span class="sub">${w.validated?'Mur validé':'En cours'}</span></div>
<div class="panel" style="margin-top:12px"><h3>1. Nombre de photos du mur</h3><div class="tabs"><button class="tab ${w.photoCount==='1'?'active':''}" onclick="setPhotoCount(${i},'1')">1 photo : DEP→FIN</button><button class="tab ${w.photoCount==='2'?'active':''}" onclick="setPhotoCount(${i},'2')">2 photos : DEP→R1→FIN</button><button class="tab ${w.photoCount==='3'?'active':''}" onclick="setPhotoCount(${i},'3')">3 photos : DEP→R1→R2→FIN</button><button class="tab ${w.photoCount==='hidden'?'active':''}" onclick="setPhotoCount(${i},'hidden')">Zone cachée</button></div></div>
<div class="panel" style="margin-top:12px"><h3>2. Photos</h3>${photoTabs(w)}${fileInput('wallPhoto',partLabel(w,state.activePart),w.photos[state.activePart]?'Photo chargée et compressée':'')}<div class="photoBox" style="margin-top:14px"><div>${stage('wall',i)}</div><div>${toolPanel(i)}${a4Panel(i)}</div></div></div>
<div class="panel" style="margin-top:12px"><h3>3. Longueur du mur</h3>${measurePanel(i)}</div>
<div class="panel" style="margin-top:12px"><h3>4. Angle et réserve</h3><div class="grid"><div class="c4"><label>Angle après ce mur</label><select id="angle"><option value="90" ${w.angle==='90'?'selected':''}>90° supposé</option><option value="confirm" ${w.angle==='confirm'?'selected':''}>À confirmer / faux équerrage</option><option value="hidden" ${w.angle==='hidden'?'selected':''}>Angle masqué</option></select></div><div class="c8"><label>Note / zone cachée</label><input id="wallNotes" value="${esc(w.notes)}" placeholder="ex : frigo dans l’angle, fin du mur cachée..."></div></div><div class="inlineActions"><button class="green" onclick="setConf(${i},'green')">Fiable</button><button class="orange" onclick="setConf(${i},'orange')">À confirmer</button><button class="red" onclick="markHidden(${i})">Zone cachée</button></div></div>`}
function photoTabs(w){const req=requiredParts(w);return `<div class="tabs" style="margin-bottom:10px">${req.map(p=>`<button class="tab ${state.activePart===p?'active':''} ${w.photos[p]?'done':''}" onclick="state.activePart='${p}';render()">${partLabel(w,p)}</button>`).join('')}</div>`}
function toolPanel(){const keys=['DEP','R1','R2','FIN','CACHE','A4A','A4B','M1','M2','EVAC','EAU','ELEC','FEN','PORTE'];return `<div class="panel"><h3>Repère à placer</h3><div class="hint blueBox" style="margin-bottom:10px"><b>Repères verts/bleus/noirs :</b> ce sont les feuilles physiques. <br><b>A4A/A4B/M1/M2 :</b> ce sont des points de mesure, ils ne remplacent pas DEP/R1/FIN.</div><div class="tools">${keys.map(k=>`<button class="${state.tool===k?'active':''}" onclick="state.tool='${k}';render()">${tools[k].i} ${tools[k].l}</button>`).join('')}</div><div class="hint" style="margin-top:12px">Clique sur l’image pour placer le repère sélectionné. Clique sur un repère existant pour le supprimer.</div></div>`}
function a4Panel(i){const w=state.walls[i], est=a4Estimate(w,state.activePart);return `<div class="panel" style="margin-top:12px"><h3>Estimation A4 de la photo active</h3><div class="hint orangeBox"><b>Optionnel :</b> place A4A et A4B sur le grand côté d’une feuille A4 visible, puis M1 et M2 sur la distance visible. Ensuite tu peux ajouter cette distance comme segment.</div><div class="stats"><div class="stat"><span>Distance estimée</span><b>${est?est.toFixed(2)+' m':'—'}</b></div><div class="stat"><span>Photo</span><b>${partLabel(w,state.activePart).replace('Photo ','')}</b></div><div class="stat"><span>Échelle</span><b>A4</b></div></div>${est?`<button class="green" style="margin-top:10px" onclick="addA4AsSegment(${i})">Ajouter comme segment</button>`:''}</div>`}
function measurePanel(i){const w=state.walls[i];return `<div class="tabs"><button class="tab ${w.measureMode==='total'?'active':''}" onclick="setMeasureMode(${i},'total')">Longueur totale</button><button class="tab ${w.measureMode==='segments'?'active':''}" onclick="setMeasureMode(${i},'segments')">Segments</button><button class="tab ${w.measureMode==='unknown'?'active':''}" onclick="setMeasureMode(${i},'unknown')">Non mesurable</button></div>
${w.measureMode==='total'?`<div class="grid" style="margin-top:12px"><div class="c6"><label>Longueur totale mesurée</label><input id="manual" type="number" step="0.01" value="${esc(w.manual)}" placeholder="ex : 4.82"></div><div class="c6"><div class="hint">À utiliser si tu peux mesurer le mur complet au laser / mètre.</div></div></div>`:''}
${w.measureMode==='segments'?`<div class="hint" style="margin-top:12px"><b>Segments :</b> ajoute les distances obtenues par mesure manuelle ou par estimation A4. Le total valide le mur.</div><div class="segments" style="margin-top:10px">${w.segments.map((s,idx)=>`<div class="seg"><div><label>Nom segment</label><input value="${esc(s.label)}" onchange="state.walls[${i}].segments[${idx}].label=this.value;render()"></div><div><label>Longueur m</label><input type="number" step="0.01" value="${esc(s.value)}" onchange="state.walls[${i}].segments[${idx}].value=this.value;render()"></div><button class="red small" onclick="removeSegment(${i},${idx})">×</button></div>`).join('')}</div><div class="inlineActions"><button class="secondary" onclick="addSegment(${i})">+ Ajouter segment manuel</button></div>`:''}
${w.measureMode==='unknown'?`<div class="hint warn" style="margin-top:12px"><b>Non mesurable :</b> le rapport indiquera que la longueur exacte doit être confirmée après déplacement des obstacles ou après dépose.</div>`:''}
<div class="stats"><div class="stat"><span>Total segments</span><b>${segmentTotal(w)?segmentTotal(w).toFixed(2)+' m':'—'}</b></div><div class="stat"><span>Longueur totale</span><b>${w.manual?esc(w.manual)+' m':'—'}</b></div><div class="stat"><span>Retenu</span><b>${finalLen(w)||'—'} m</b></div></div>`}
function screenTech(){return `${head('ÉTAPE 7 / 9','Photos techniques','On sécurise les points bloquants : évacuation, eau, prises, hotte, gaz, zones cachées.')}${big('⛔','Priorité absolue : évacuation finale','Photo de loin + photo de près. Si elle est cachée : photo de la zone + note “non visible”.')}
<div class="grid"><div class="c4"><label>Type</label><select id="techType"><option>Évacuation finale</option><option>Arrivées d’eau</option><option>Prises / électricité</option><option>Hotte / ventilation</option><option>Gaz</option><option>Zone cachée / inaccessible</option></select></div><div class="c4"><label>Mur / zone</label><select id="techWall">${state.walls.map(w=>`<option>${w.name}</option>`).join('')}<option>Autre zone</option></select></div><div class="c4">${fileInput('techPhoto','Prendre photo technique')}</div><div class="c12"><label>Note</label><input id="techNote" placeholder="Ex : évacuation cachée derrière meuble..."></div></div><div class="inlineActions"><button class="blue" onclick="addTechPhoto()">+ Ajouter au relevé</button></div><div class="panel" style="margin-top:14px"><h3>Photos ajoutées</h3><div class="mini">${state.techPhotos.length?state.techPhotos.map((p,i)=>`<div class="item"><div><strong>${esc(p.type)} — ${esc(p.wall)}</strong><small>${esc(p.note||'Sans note')}</small></div><button class="red small" onclick="state.techPhotos.splice(${i},1);render()">×</button></div>`).join(''):'<div class="hint">Aucune photo technique ajoutée.</div>'}</div></div>`}
function screenValidation(){return `${head('ÉTAPE 8 / 9','Validation','Contrôle les murs, les longueurs retenues et les zones à confirmer.')}${big('✅','Contrôle final','Le rapport indique les photos, les segments et les murs non mesurables.')}
<div class="grid"><div class="c6"><div class="plan">${planSVG()}</div></div><div class="c6"><div class="panel"><h3>Murs</h3><table><thead><tr><th>Mur</th><th>Mode</th><th>Longueur</th><th>Fiabilité</th></tr></thead><tbody>${state.walls.map(w=>`<tr><td>${w.name}</td><td>${measureLabel(w)}</td><td>${esc(finalLen(w)||'à mesurer')} m</td><td>${confText(w)}</td></tr>`).join('')}</tbody></table></div></div></div><div class="facades">${state.walls.map(w=>`<div class="panel"><h3>Façade mur ${w.name}</h3>${facadeSVG(w)}</div>`).join('')}</div><div class="grid" style="margin-top:14px"><div class="c12"><label>Points à confirmer</label><textarea id="notes">${esc(state.notes)}</textarea></div><div class="c12"><label>Réserve automatique / ajustable</label><textarea id="reserve">${esc(state.reserve||defaultReserve())}</textarea></div></div><div class="inlineActions noPrint"><button class="green" onclick="saveLocal()">Enregistrer</button><button class="secondary" onclick="exportJSON()">Exporter JSON</button></div>`}
function screenReport(){return `<div class="noPrint">${head('ÉTAPE 9 / 9','Rapport final','Imprime en PDF depuis le navigateur ou exporte le JSON.')}${big('📄','Rapport prêt','Le rapport reprend les photos, les segments, les zones cachées et les réserves.')}</div>${reportHTML()}`}
function fileInput(id,label,msg=''){return `<label>${label}</label><input id="${id}" type="file" accept="image/*" capture="environment"><div class="sub">${msg}</div>`}
function stage(mode,i=null){const d=mode==='wall'?{src:state.walls[i].photos[state.activePart]||'',points:state.walls[i].points.filter(p=>p.part===state.activePart)}:{src:'',points:[]};return `<div class="stage" id="stage">${d.src?`<img src="${d.src}" alt="photo">${lines(d.points)}${d.points.map((p,k)=>pointHTML(p,k)).join('')}`:'<div class="empty">Aucune photo chargée<br><small>Appuie sur le champ photo au-dessus</small></div>'}</div>`}
function pointHTML(p,k){const t=tools[p.type]||tools.TECH;return `<div class="pt ${t.c}" style="left:${p.x}%;top:${p.y}%" onclick="delPoint(event,${k})" title="${esc(t.l)}">${t.i}</div>`}
function lines(points){const get=t=>points.find(p=>p.type===t);let out='';[['A4A','A4B','#0891b2'],['M1','M2','#f59e0b']].forEach(([a,b,c])=>{const p1=get(a),p2=get(b);if(p1&&p2)out+=`<line x1="${p1.x}%" y1="${p1.y}%" x2="${p2.x}%" y2="${p2.y}%" stroke="${c}" stroke-width="3" stroke-dasharray="7 5"/>`});return `<svg class="overlay">${out}</svg>`}
function bind(){['client','adresse','date','tech','etat','comment'].forEach(id=>{const e=$(id);if(e)e.oninput=()=>state.project[id]=e.value});document.querySelectorAll('[data-prep]').forEach(c=>c.onchange=()=>{state.prep[c.dataset.prep]=c.checked;render()});const wp=$('wallPhoto');if(wp)wp.onchange=e=>readCompress(e,s=>{currentWall().photos[state.activePart]=s;render()});const tp=$('techPhoto');if(tp)tp.onchange=e=>readCompress(e,s=>{tp.dataset.img=s});const st=$('stage');if(st)st.onclick=placePoint;const m=$('manual');if(m)m.oninput=()=>{let w=currentWall();w.manual=m.value;if(m.value){w.final=m.value;w.confidence='green'}};const an=$('angle');if(an)an.onchange=()=>currentWall().angle=an.value;const wn=$('wallNotes');if(wn)wn.oninput=()=>currentWall().notes=wn.value;const no=$('notes');if(no)no.oninput=()=>state.notes=no.value;const re=$('reserve');if(re)re.oninput=()=>state.reserve=re.value}
function setPhotoCount(i,count){state.walls[i].photoCount=count;state.activePart='p1'; if(count==='hidden'){state.walls[i].measureMode='unknown';state.walls[i].confidence='red'} render()}
function setMeasureMode(i,mode){const w=state.walls[i];w.measureMode=mode;if(mode==='unknown'){w.final='';w.confidence='red'}render()}
function addSegment(i,label='',value=''){const w=state.walls[i];w.segments.push({label:label||'Segment '+(w.segments.length+1),value:value||''});w.measureMode='segments';render()}
function removeSegment(i,idx){state.walls[i].segments.splice(idx,1);render()}
function addA4AsSegment(i){const w=state.walls[i], est=a4Estimate(w,state.activePart);if(!est)return alert('Il manque A4A/A4B/M1/M2 sur la photo active.');w.segments.push({label:partLabel(w,state.activePart),value:est.toFixed(2)});w.measureMode='segments';w.confidence='orange';render()}
function readCompress(e,cb){const f=e.target.files&&e.target.files[0];if(!f)return;loader(true);const reader=new FileReader();reader.onload=()=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height,ratio=Math.min(1,MAX_IMAGE/Math.max(w,h));let cw=Math.round(w*ratio),ch=Math.round(h*ratio);const canvas=document.createElement('canvas');canvas.width=cw;canvas.height=ch;const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,cw,ch);let data=canvas.toDataURL('image/jpeg',QUALITY);loader(false);cb(data)};img.onerror=()=>{loader(false);alert('Photo non lisible par le navigateur. Essaie de la reprendre en JPG.');};img.src=reader.result};reader.readAsDataURL(f)}
function loader(on){$('loader').classList.toggle('on',!!on)}
function placePoint(e){if(e.target.classList.contains('pt'))return;const st=$('stage');if(!st||!st.querySelector('img'))return;const r=st.getBoundingClientRect();let p={type:state.tool,x:((e.clientX-r.left)/r.width*100).toFixed(2),y:((e.clientY-r.top)/r.height*100).toFixed(2),label:''};const noteTypes=['CACHE','EVAC','EAU','ELEC','FEN','PORTE','TECH'];if(noteTypes.includes(p.type)){const note=prompt('Note pour ce repère',tools[p.type].l);if(note===null)return;p.label=note}let w=currentWall();p.part=state.activePart;const replaceTypes=['DEP','R1','R2','FIN','CACHE','A4A','A4B','M1','M2']; if(replaceTypes.includes(p.type))w.points=w.points.filter(x=>!(x.type===p.type&&x.part===state.activePart));w.points.push(p);render()}
function delPoint(e,k){e.stopPropagation();let w=currentWall();let pts=w.points.filter(p=>p.part===state.activePart);let target=pts[k];let idx=w.points.indexOf(target);if(idx>=0)w.points.splice(idx,1);render()}
function dist(a,b){return Math.hypot(num(a.x)-num(b.x),num(a.y)-num(b.y))}
function a4Estimate(w,part){const pts=w.points.filter(p=>p.part===part);const get=t=>pts.find(p=>p.type===t);const a=get('A4A'),b=get('A4B'),m1=get('M1'),m2=get('M2');if(!a||!b||!m1||!m2)return 0;const a4=dist(a,b), meas=dist(m1,m2);return a4>0?(meas/a4)*0.297:0}
function segmentTotal(w){return w.segments.reduce((s,x)=>s+num(x.value),0)}
function finalLen(w){if(w.measureMode==='total')return w.manual||w.final||'';if(w.measureMode==='segments')return segmentTotal(w)?segmentTotal(w).toFixed(2):'';return ''}
function confText(w){return w.confidence==='green'?'Fiable':w.confidence==='red'?'Non mesurable':'À confirmer'}function measureLabel(w){return w.measureMode==='segments'?'Segments':w.measureMode==='unknown'?'Non mesurable':'Longueur totale'}function setConf(i,c){state.walls[i].confidence=c;render()}function markHidden(i){let w=state.walls[i];w.confidence='red';w.measureMode='unknown';w.notes=w.notes||'Zone cachée / mesure à confirmer';render()}
function validateWall(i,move){let w=state.walls[i], missing=requiredParts(w).filter(p=>!w.photos[p]);if(missing.length && w.measureMode!=='unknown')return alert('Il manque une photo : '+missing.map(p=>partLabel(w,p)).join(', '));if(w.measureMode==='total'&&w.manual)w.final=w.manual;if(w.measureMode==='segments'&&segmentTotal(w))w.final=segmentTotal(w).toFixed(2);if(!finalLen(w)&&w.measureMode!=='unknown')return alert('Il manque une longueur : saisis une longueur totale, ajoute des segments, ou marque le mur non mesurable.');w.validated=true;if(w.measureMode!=='unknown'&&w.confidence!=='red')w.confidence=w.confidence==='green'?'green':'orange';if(move) i<3?go(i+3):go(6);else render()}
function addTechPhoto(){const inp=$('techPhoto');const src=inp&&inp.dataset.img;if(!src)return alert('Ajoute d’abord une photo.');state.techPhotos.push({type:$('techType').value,wall:$('techWall').value,note:$('techNote').value,src});render()}
function planSVG(){let pts=[{x:0,y:0}],x=0,y=0,dir=0;state.walls.forEach(w=>{let L=num(finalLen(w))||1;x+=L*Math.cos(dir*Math.PI/180);y+=L*Math.sin(dir*Math.PI/180);pts.push({x,y});let ang=num(w.angle);dir+=ang||90});let xs=pts.map(p=>p.x),ys=pts.map(p=>p.y),minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys),W=620,H=360,pad=48,sc=Math.min((W-2*pad)/Math.max(.1,maxX-minX),(H-2*pad)/Math.max(.1,maxY-minY)),tx=v=>pad+(v-minX)*sc,ty=v=>H-pad-(v-minY)*sc,out='';for(let i=0;i<pts.length-1;i++){let a=pts[i],b=pts[i+1],w=state.walls[i];out+=`<line x1="${tx(a.x)}" y1="${ty(a.y)}" x2="${tx(b.x)}" y2="${ty(b.y)}" stroke="#10213f" stroke-width="5" stroke-linecap="round"/><text x="${(tx(a.x)+tx(b.x))/2}" y="${(ty(a.y)+ty(b.y))/2-10}" text-anchor="middle" font-size="13" font-weight="900" fill="#172033">Mur ${w.name} - ${esc(finalLen(w)||'?')} m</text>`}let gap=Math.hypot(pts[0].x-pts[pts.length-1].x,pts[0].y-pts[pts.length-1].y);return `<svg viewBox="0 0 ${W} ${H}"><rect width="${W}" height="${H}" fill="#fbfdff"/>${out}${gap>.35?`<text x="20" y="335" fill="#d92d20" font-size="13" font-weight="900">Contour non fermé : ${gap.toFixed(2)} m d’écart. À contrôler.</text>`:''}</svg>`}
function color(t){return {EVAC:'#d92d20',EAU:'#06b6d4',ELEC:'#7c3aed',FEN:'#14b8a6',PORTE:'#795548',CACHE:'#111827',TECH:'#64748b'}[t]||'#1f5eff'}
function facadeSVG(w){let W=460,H=245,pad=34,items='';w.points.filter(p=>['EVAC','EAU','ELEC','FEN','PORTE','CACHE','TECH'].includes(p.type)).forEach(p=>{let t=tools[p.type],x=pad+num(p.x)/100*(W-2*pad),y=pad+num(p.y)/100*(H-2*pad);items+=`<circle cx="${x}" cy="${y}" r="12" fill="${color(p.type)}" stroke="#fff" stroke-width="3"/><text x="${x}" y="${y+4}" text-anchor="middle" font-size="10" font-weight="900" fill="#fff">${t.i}</text><text x="${x}" y="${y-16}" text-anchor="middle" font-size="10" font-weight="800" fill="#172033">${esc(t.l)}</text>`});return `<svg viewBox="0 0 ${W} ${H}"><rect width="${W}" height="${H}" rx="14" fill="#fff" stroke="#dbe3ef"/><line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="#10213f" stroke-width="4"/><text x="${W/2}" y="${H-8}" text-anchor="middle" font-size="12" font-weight="900" fill="#657187">Mur ${w.name} - ${esc(finalLen(w)||'?')} m</text>${items}</svg>`}
function hasEvac(){return state.walls.some(w=>w.points.some(p=>p.type==='EVAC'))||state.techPhotos.some(p=>p.type==='Évacuation finale')}function defaultReserve(){let hidden=state.walls.filter(w=>w.confidence==='red'||w.measureMode==='unknown').map(w=>'mur '+w.name).join(', ');return `Le relevé technique a été réalisé avec une méthode photo-guidée utilisant des feuilles A4 comme repères physiques. Une feuille A4 correspond à un seul repère : DEP, R1, R2, FIN ou CACHÉ. Les distances ont été renseignées en longueur totale, par segments, ou déclarées à confirmer lorsque la zone n’était pas mesurable.\n\nL’évacuation finale constitue la contrainte prioritaire pour le raccordement de l’évier, du lave-vaisselle et/ou du lave-linge. ${hasEvac()?'Elle a été repérée dans le relevé photo.':'Elle n’a pas été clairement repérée : son emplacement devra être confirmé avant travaux ou après dépose.'}${hidden?'\n\nZones à confirmer : '+hidden+'.':''}`}
function wallPhotosHTML(w){let imgs=Object.entries(w.photos).filter(([k,v])=>v).map(([k,v])=>`<div><b>${partLabel(w,k)}</b><img src="${v}"></div>`).join('');return imgs?`<div class="reportPhotos">${imgs}</div>`:'<p>Aucune photo mur.</p>'}
function reportHTML(){state.reserve=state.reserve||defaultReserve();let tech=state.techPhotos.map(p=>`<div class="reportBlock"><h3>${esc(p.type)} - ${esc(p.wall)}</h3><img src="${p.src}" style="width:100%;max-height:340px;object-fit:contain;border:1px solid #e5e7eb;border-radius:12px;background:#f3f4f6"><p>${esc(p.note||'')}</p></div>`).join('');return `<div class="reportSheet"><div class="reportTitle"><h2>Relevé technique cuisine</h2><p>${esc(state.project.client||'Client non renseigné')} - ${esc(state.project.adresse||'Adresse non renseignée')}</p></div><div class="reportBody"><div class="reportGrid"><div class="reportBlock"><h3>Infos chantier</h3><div class="kv"><b>Client</b><span>${esc(state.project.client)}</span><b>Adresse</b><span>${esc(state.project.adresse)}</span><b>Date</b><span>${esc(state.project.date)}</span><b>Technicien</b><span>${esc(state.project.tech)}</span><b>État</b><span>${esc(state.project.etat)}</span></div></div><div class="reportBlock"><h3>Synthèse</h3><ul><li>Murs renseignés : ${state.walls.filter(w=>finalLen(w)).length}/${state.walls.length}</li><li>Évacuation finale : ${hasEvac()?'repérée':'à confirmer'}</li><li>Photos techniques : ${state.techPhotos.length}</li></ul></div></div><div class="reportBlock"><h3>Vue de dessus</h3>${planSVG()}</div><div class="reportBlock"><h3>Murs</h3><ul>${state.walls.map(w=>`<li><b>Mur ${w.name}</b> : ${esc(finalLen(w)||'à mesurer')} m - mode : ${measureLabel(w)} - photos : ${w.photoCount} - angle après : ${esc(w.angle)} - fiabilité : ${confText(w)}${w.notes?' - '+esc(w.notes):''}${w.measureMode==='segments'&&segmentTotal(w)?' - segments : '+w.segments.map(s=>esc(s.label)+' '+esc(s.value)+' m').join(', '):''}</li>`).join('')}</ul></div><div class="reportGrid">${state.walls.map(w=>`<div class="reportBlock"><h3>Façade mur ${w.name}</h3>${facadeSVG(w)}</div>`).join('')}</div>${state.walls.map(w=>`<div class="reportBlock"><h3>Photos mur ${w.name}</h3>${wallPhotosHTML(w)}</div>`).join('')}${tech?`<div class="reportGrid">${tech}</div>`:''}<div class="reportBlock"><h3>Réserves</h3><p style="white-space:pre-line;line-height:1.45">${esc(state.reserve)}</p></div><div class="reportBlock"><h3>Points à confirmer</h3><p style="white-space:pre-line;line-height:1.45">${esc(state.notes||'Aucun point complémentaire renseigné.')}</p></div></div></div>`}
function saveLocal(){try{localStorage.setItem(STORAGE,JSON.stringify(state));alert('Relevé enregistré dans ce navigateur.')}catch(e){alert('Sauvegarde impossible : trop de photos. Exporte le JSON ou supprime quelques photos.')}}function loadLocal(){let raw=localStorage.getItem(STORAGE);if(!raw)return alert('Aucune sauvegarde.');state=JSON.parse(raw);render()}function exportJSON(){let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='releve_a4_v06_'+(state.project.client||'client').replace(/[^a-zA-Z0-9]+/g,'_')+'.json';a.click();URL.revokeObjectURL(a.href)}function resetAll(){if(confirm('Effacer ce relevé ?')){localStorage.removeItem(STORAGE);state={step:0,tool:'DEP',activePart:'p1',project:{client:'',adresse:'',date:new Date().toISOString().slice(0,10),tech:'',etat:'Cuisine existante en place / encombrée',comment:''},prep:{sheets:false,marker:false,photos:false,hidden:false},walls:[],techPhotos:[],notes:'',reserve:''};initWalls();render()}}
render();
</script>
