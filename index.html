<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Assistant relevé cuisine — V0.3 mobile</title>
  <style>
    :root{
      --bg:#f5f7fb;--card:#fff;--ink:#142033;--muted:#667085;--line:#dce5f2;
      --blue:#1f5eff;--blue2:#eaf0ff;--green:#119c63;--green2:#e8f8f0;
      --orange:#f59e0b;--orange2:#fff7e6;--red:#d92d20;--red2:#fff0ed;--dark:#10213f;
      --shadow:0 14px 34px rgba(20,32,51,.10);--r:22px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#edf4ff 0,var(--bg) 320px);color:var(--ink)}
    header{position:sticky;top:0;z-index:50;background:rgba(245,247,251,.94);backdrop-filter:blur(14px);border-bottom:1px solid rgba(220,229,242,.92)}
    .top{max-width:980px;margin:auto;padding:12px 14px}.title{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.title h1{font-size:18px;margin:0;letter-spacing:-.02em}.ver{font-size:11px;font-weight:900;color:var(--blue);white-space:nowrap}.sub{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.3}
    .progress{height:10px;background:#e6edf8;border-radius:999px;overflow:hidden;margin-top:10px}.progress div{height:100%;width:0;background:linear-gradient(90deg,var(--blue),#14b8a6);transition:.25s}
    main{max-width:980px;margin:18px auto 96px;padding:0 14px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:18px}.kicker{display:inline-flex;background:var(--blue2);color:#0d3ec9;border:1px solid #c8d6ff;border-radius:999px;padding:7px 11px;font-size:12px;font-weight:900;margin-bottom:10px}h2{font-size:26px;margin:0;letter-spacing:-.03em}.lead{color:var(--muted);line-height:1.45;margin:8px 0 0}.big{background:var(--dark);color:white;border-radius:20px;padding:18px;margin:16px 0;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center}.big .ico{font-size:44px}.big b{display:block;font-size:19px;margin-bottom:4px}.big span{display:block;color:#cfdaee;line-height:1.42}
    button{border:0;border-radius:999px;padding:13px 16px;background:var(--ink);color:white;font-weight:900;cursor:pointer;box-shadow:0 8px 18px rgba(20,32,51,.15);font-size:15px}button.secondary{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:none}button.blue{background:var(--blue)}button.green{background:var(--green)}button.red{background:var(--red)}button.orange{background:var(--orange);color:#2b1b00}button.small{padding:8px 10px;border-radius:12px;font-size:12px;box-shadow:none}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}.c12{grid-column:span 12}.c8{grid-column:span 8}.c6{grid-column:span 6}.c4{grid-column:span 4}.c3{grid-column:span 3}.c2{grid-column:span 2}
    label{display:block;margin:0 0 6px;color:#344054;font-weight:900;font-size:12px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:15px;padding:13px 12px;background:#fff;color:var(--ink);font:inherit;outline:none}textarea{min-height:96px;resize:vertical;line-height:1.45}input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(31,94,255,.10)}
    .hint{background:#f8fbff;border:1px dashed #c8d5ea;color:#40506a;border-radius:16px;padding:13px 14px;line-height:1.45;font-size:14px}.warn{background:var(--red2);border-color:#ffc9c1;color:#8b2117}.ok{background:var(--green2);border-color:#bfe8d2;color:#086b43}.orangeBox{background:var(--orange2);border-color:#ffe0a3;color:#765000}
    .checks{display:grid;grid-template-columns:1fr;gap:10px}.check{border:1px solid var(--line);background:white;border-radius:18px;padding:14px;display:flex;gap:12px;cursor:pointer}.check input{width:auto;margin-top:4px}.check b{display:block}.check small{display:block;color:var(--muted);line-height:1.35;margin-top:4px}.check.on{background:var(--green2);border-color:#a7e0c2}
    .photoBox{display:grid;grid-template-columns:1fr;gap:14px}.stage{min-height:420px;background:#eef3fb;border:1px dashed #b9c7da;border-radius:20px;overflow:hidden;position:relative;display:grid;place-items:center;touch-action:manipulation}.stage img{width:100%;height:100%;max-height:560px;object-fit:contain;background:#e9eef6;display:block}.empty{text-align:center;color:#657187;font-weight:900;padding:26px;line-height:1.35}.overlay{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none}.pt{position:absolute;transform:translate(-50%,-50%);width:34px;height:34px;border-radius:50%;display:grid;place-items:center;border:3px solid white;color:white;font-size:12px;font-weight:900;box-shadow:0 7px 18px rgba(0,0,0,.30);cursor:pointer}.rule{background:#0ea5e9}.wall{background:var(--dark)}.evac{background:var(--red)}.water{background:#06b6d4}.elec{background:#7c3aed}.window{background:#14b8a6}.door{background:#795548}.hiddenPt{background:#111827}.hot{background:#64748b}.gaz{background:#f59e0b;color:#211300}
    .tools{display:grid;grid-template-columns:1fr 1fr;gap:8px}.tools button{background:white;color:var(--ink);border:1px solid var(--line);box-shadow:none;text-align:left;border-radius:14px;font-size:13px;padding:10px}.tools button.active{background:var(--blue);color:white;border-color:var(--blue)}.panel{border:1px solid var(--line);border-radius:18px;background:#fbfdff;padding:14px}.panel h3{font-size:16px;margin:0 0 10px}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{background:white!important;color:var(--ink)!important;border:1px solid var(--line)!important;box-shadow:none!important}.tab.active{background:var(--blue)!important;color:white!important;border-color:var(--blue)!important}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}.stat{background:white;border:1px solid var(--line);border-radius:16px;padding:12px}.stat span{display:block;color:var(--muted);font-size:12px;font-weight:800}.stat b{font-size:20px}.tag{display:inline-flex;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900}.tag.green{background:var(--green2);color:var(--green);border:1px solid #bfe8d2}.tag.orange{background:var(--orange2);color:#8a5b00;border:1px solid #ffe0a3}.tag.red{background:var(--red2);color:var(--red);border:1px solid #ffc9c1}
    .bottomNav{position:fixed;left:0;right:0;bottom:0;z-index:60;background:rgba(245,247,251,.95);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:10px 12px calc(10px + env(safe-area-inset-bottom));display:flex;gap:8px;justify-content:center}.bottomNav button{min-width:110px}.bottomNav .mainBtn{flex:1;max-width:340px}.inlineActions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.mini{display:flex;flex-direction:column;gap:8px;max-height:280px;overflow:auto}.item{display:flex;justify-content:space-between;gap:8px;border:1px solid var(--line);border-radius:14px;background:white;padding:10px}.item strong{font-size:13px}.item small{display:block;color:var(--muted);line-height:1.35;margin-top:3px}
    .plan{min-height:330px;border:1px solid var(--line);border-radius:20px;background:linear-gradient(45deg,#fff,#f8fbff);display:grid;place-items:center;overflow:hidden}.facades{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}table{width:100%;border-collapse:separate;border-spacing:0 8px}th{text-align:left;color:var(--muted);font-size:12px;padding:0 8px}td{background:#f9fbfe;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:8px}td:first-child{border-left:1px solid var(--line);border-radius:13px 0 0 13px}td:last-child{border-right:1px solid var(--line);border-radius:0 13px 13px 0}
    .reportSheet{max-width:980px;margin:auto;border:1px solid #e5e7eb;border-radius:18px;overflow:hidden;background:white}.reportTitle{padding:22px;background:#10213f;color:white}.reportTitle h2{font-size:26px;margin:0}.reportTitle p{color:#cdd7ea;margin:5px 0 0}.reportBody{padding:22px;display:flex;flex-direction:column;gap:16px}.reportGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.reportBlock{border:1px solid #e5e7eb;border-radius:14px;padding:14px;background:white}.reportBlock h3{margin:0 0 10px;color:#10213f}.kv{display:grid;grid-template-columns:160px 1fr;gap:6px 10px;font-size:14px}.kv b{color:#4b5563}.reportBlock ul{margin:0;padding-left:20px}.reportBlock li{margin:4px 0;line-height:1.35}
    .desktopOnly{display:none}.loader{display:none;position:fixed;inset:0;z-index:100;background:rgba(16,33,63,.62);place-items:center;color:white;font-weight:900}.loader.on{display:grid}.spin{width:44px;height:44px;border:5px solid rgba(255,255,255,.35);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}@keyframes spin{to{transform:rotate(360deg)}}
    @media(min-width:900px){.photoBox{grid-template-columns:1.1fr .9fr}.checks{grid-template-columns:1fr 1fr}.desktopOnly{display:block}.top{padding:14px 16px}.title h1{font-size:20px}}
    @media(max-width:760px){main{margin-top:12px;padding:0 10px}.card{padding:15px;border-radius:20px}h2{font-size:24px}.big{padding:15px}.big .ico{font-size:36px}.c8,.c6,.c4,.c3,.c2{grid-column:span 12}.stats{grid-template-columns:1fr}.facades,.reportGrid{grid-template-columns:1fr}.stage{min-height:360px}.actionsTop{display:none}.tools{grid-template-columns:1fr}.reportBody{padding:14px}.kv{grid-template-columns:1fr}.bottomNav button{min-width:88px;padding:12px 10px}}
    @media print{body{background:white}header,.bottomNav,.noPrint,.loader{display:none!important}main{display:block;max-width:none;margin:0;padding:0}.card{box-shadow:none;border:0;padding:0}.reportSheet{max-width:none;border:0;border-radius:0}.reportTitle{background:#10213f!important;color:white!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}}
  </style>
</head>
<body>
<header>
  <div class="top">
    <div class="title">
      <div><h1>Assistant relevé cuisine <span class="ver">V0.3 mobile</span></h1><div class="sub" id="stepSub">Photo-guidé — prêt pour GitHub Pages</div></div>
      <div class="actionsTop noPrint"><button class="secondary small" onclick="saveLocal()">Sauver</button><button class="secondary small" onclick="exportJSON()">JSON</button><button class="red small" onclick="resetAll()">Reset</button></div>
    </div>
    <div class="progress"><div id="bar"></div></div>
  </div>
</header>
<main><section class="card" id="app"></section></main>
<div class="bottomNav noPrint"><button class="secondary" onclick="prev()">← Retour</button><button class="blue mainBtn" onclick="nextAction()" id="nextBtn">Continuer →</button></div>
<div class="loader" id="loader"><div><div class="spin"></div><div>Compression de la photo...</div></div></div>
<script>
const VERSION='V0.3-mobile';
const STORAGE='cbat_releve_cuisine_mobile_v03';
const MAX_IMAGE=1600;
const QUALITY=.72;
const steps=['Dossier','Repères','Calibration','Mur A','Mur B','Mur C','Mur D','Technique','Validation','Rapport'];
const tools={
  rule1:{l:'Début règle 1 m',i:'R1',c:'rule'},rule2:{l:'Fin règle 1 m',i:'R2',c:'rule'},
  wall1:{l:'Début du mur',i:'M1',c:'wall'},wall2:{l:'Fin du mur',i:'M2',c:'wall'},
  evac:{l:'Évacuation finale',i:'EV',c:'evac'},water:{l:'Arrivée eau',i:'EA',c:'water'},elec:{l:'Prise / élec.',i:'⚡',c:'elec'},
  window:{l:'Fenêtre',i:'F',c:'window'},door:{l:'Porte',i:'P',c:'door'},hidden:{l:'Zone cachée',i:'?',c:'hiddenPt'},hot:{l:'Hotte / VMC',i:'H',c:'hot'},gaz:{l:'Gaz',i:'G',c:'gaz'}
};
let state={step:0,tool:'rule1',activePhoto:'main',project:{client:'',adresse:'',date:new Date().toISOString().slice(0,10),tech:'',etat:'Cuisine existante en place / encombrée',comment:''},prep:{angles:false,ruleFloor:false,ruleVertical:false,evacMarker:false,light:false},calib:{src:'',points:[]},walls:[],techPhotos:[],notes:'',reserve:''};
function initWalls(){state.walls=Array.from({length:4},(_,i)=>({name:String.fromCharCode(65+i),main:'',top:'',points:[],auto:'',manual:'',final:'',angle:90,confidence:'orange',needMeasure:false,validated:false,notes:''}));}
initWalls();
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
const num=v=>{const x=parseFloat(String(v).replace(',','.'));return isFinite(x)?x:0};
function render(){document.getElementById('bar').style.width=Math.round(progress()*100)+'%';document.getElementById('stepSub').textContent=`Étape ${state.step+1}/10 — ${steps[state.step]}`;const a=$('app');if(state.step===0)a.innerHTML=screenInfo();if(state.step===1)a.innerHTML=screenPrep();if(state.step===2)a.innerHTML=screenCalib();if(state.step>=3&&state.step<=6)a.innerHTML=screenWall(state.step-3);if(state.step===7)a.innerHTML=screenTech();if(state.step===8)a.innerHTML=screenValidation();if(state.step===9)a.innerHTML=screenReport();bind();updateNextLabel();}
function progress(){let d=0;for(let i=0;i<9;i++)if(done(i))d++;return d/9}
function done(i){if(i===0)return !!state.project.client;if(i===1)return Object.values(state.prep).filter(Boolean).length>=4;if(i===2)return !!state.calib.src;if(i>=3&&i<=6){const w=state.walls[i-3];return !!w.main&&(!!finalLen(w)||w.needMeasure)}if(i===7)return state.techPhotos.length>0;if(i===8)return state.walls.some(w=>w.validated)||state.walls.some(w=>finalLen(w));return false}
function go(i){state.step=Math.max(0,Math.min(9,i));render();scrollTo({top:0,behavior:'smooth'})}
function prev(){go(state.step-1)}
function nextAction(){if(state.step===9){window.print();return} if(state.step>=3&&state.step<=6){validateWall(state.step-3,true);return} go(state.step+1)}
function updateNextLabel(){const b=$('nextBtn');if(state.step===9)b.textContent='Imprimer / PDF';else if(state.step>=3&&state.step<=6)b.textContent='Valider ce mur →';else if(state.step===8)b.textContent='Générer rapport →';else b.textContent='Continuer →'}
function head(k,t,l){return `<div class="kicker">${k}</div><h2>${t}</h2><p class="lead">${l}</p>`}
function big(icon,title,text){return `<div class="big"><div class="ico">${icon}</div><div><b>${title}</b><span>${text}</span></div></div>`}
function screenInfo(){return `${head('ÉTAPE 1 / 10','Dossier chantier','Le technicien renseigne le minimum. Le reste se construit avec les photos.')}${big('🧭','Mode débutant','L’écran donne une seule consigne à la fois. L’outil demande une mesure uniquement si la photo n’est pas assez fiable.')}
<div class="grid"><div class="c4"><label>Client</label><input id="client" value="${esc(state.project.client)}" placeholder="Nom client"></div><div class="c4"><label>Adresse</label><input id="adresse" value="${esc(state.project.adresse)}" placeholder="Adresse chantier"></div><div class="c2"><label>Date</label><input id="date" type="date" value="${esc(state.project.date)}"></div><div class="c2"><label>Technicien</label><input id="tech" value="${esc(state.project.tech)}" placeholder="Nom"></div><div class="c4"><label>État de la pièce</label><select id="etat"><option ${state.project.etat==='Cuisine existante en place / encombrée'?'selected':''}>Cuisine existante en place / encombrée</option><option ${state.project.etat==='Cuisine vide'?'selected':''}>Cuisine vide</option><option ${state.project.etat==='Cuisine en cours de dépose'?'selected':''}>Cuisine en cours de dépose</option></select></div><div class="c8"><label>Commentaire départ</label><input id="comment" value="${esc(state.project.comment)}" placeholder="Ex : accès difficile, meubles en place..."></div></div><div class="inlineActions noPrint"><button class="secondary" onclick="loadLocal()">Recharger sauvegarde</button><button class="secondary" onclick="saveLocal()">Enregistrer</button><button class="secondary" onclick="exportJSON()">Exporter JSON</button></div>`}
function screenPrep(){const items=[['angles','Repères d’angles','Un repère dans les angles visibles de la pièce.'],['ruleFloor','Règle au sol','Règle de 1 m visible contre le mur photographié.'],['ruleVertical','Règle verticale','Pour les hauteurs et les vues de face.'],['evacMarker','Repère évacuation','Repère rouge près de l’évacuation finale.'],['light','Pièce éclairée','Allumer la lumière et reculer ce qui gêne.']];return `${head('ÉTAPE 2 / 10','Prépare les repères','Aucune mesure pour l’instant. On prépare seulement la pièce.')}${big('📍','Pose les repères','Repères d’angles, règle au sol, règle verticale, repère rouge évacuation. Puis seulement après : photos.')}
<div class="checks">${items.map(([k,t,d])=>`<label class="check ${state.prep[k]?'on':''}"><input type="checkbox" data-prep="${k}" ${state.prep[k]?'checked':''}><span><b>${t}</b><small>${d}</small></span></label>`).join('')}</div><div class="hint warn" style="margin-top:14px"><b>Évacuation finale :</b> si elle n’est pas visible, le technicien doit prendre la photo de la zone cachée et noter “non visible”.</div>`}
function screenCalib(){return `${head('ÉTAPE 3 / 10','Photo de calibration','La règle de 1 m doit être entière, nette et visible.')}${big('📏','Photo du sol','Prends une photo du sol avec la règle de 1 m. Puis clique sur R1 et R2 aux extrémités de la règle.')}${fileInput('calibInput','Prendre / charger la photo du sol')}
<div class="photoBox"><div>${stage('calib')}</div><div>${toolPanel('calib')}<div class="hint" style="margin-top:12px">Sélectionne <b>R1</b>, clique sur le début de la règle. Sélectionne <b>R2</b>, clique sur la fin.</div>${calibStats()}</div></div>`}
function screenWall(i){const w=state.walls[i],name=w.name;return `${head(`ÉTAPE ${i+4} / 10`,`Mur ${name}`,'Le technicien tourne vers la droite et prend le mur suivant.')}<div style="display:flex;justify-content:space-between;gap:10px;align-items:center;margin-top:12px"><span class="tag ${w.confidence==='green'?'green':w.confidence==='red'?'red':'orange'}">${confText(w)}</span><span class="sub">${w.validated?'Mur validé':'En cours'}</span></div>${big('📸','Prends la photo de gauche à droite','La règle doit être visible. Si le mur est caché, prends quand même la photo et clique “zone cachée / non mesurable”.')}
<div class="grid"><div class="c6">${fileInput('wallMain','Photo principale bas du mur',w.main?'Photo chargée et compressée':'')}</div><div class="c6">${fileInput('wallTop','Photo complément haut / plafond',w.top?'Photo chargée et compressée':'')}</div></div>
<div class="photoBox" style="margin-top:14px"><div>${stage('wall',i)}</div><div>${toolPanel('wall',i)}${wallStats(i)}<div class="panel" style="margin-top:12px"><h3>Réajustement rapide</h3><div class="grid"><div class="c6"><label>Longueur mesurée au laser / mètre</label><input id="manual" type="number" step="0.01" value="${esc(w.manual)}" placeholder="ex : 3.42"></div><div class="c6"><label>Angle après ce mur</label><input id="angle" type="number" step="1" value="${esc(w.angle)}"></div><div class="c12"><label>Note / zone cachée</label><input id="wallNotes" value="${esc(w.notes)}" placeholder="ex : meuble en place, à confirmer après dépose"></div></div><div class="inlineActions"><button class="green" onclick="setConf(${i},'green')">✅ fiable</button><button class="orange" onclick="setConf(${i},'orange')">🟠 à confirmer</button><button class="red" onclick="markHidden(${i})">🔴 zone cachée</button></div></div></div></div>`}
function screenTech(){return `${head('ÉTAPE 8 / 10','Photos techniques','On sécurise les points qui peuvent bloquer la cuisine.')}${big('⛔','Priorité absolue : évacuation finale','Photo de loin + photo de près. Si elle est cachée : photo de la zone + note “non visible”.')}
<div class="grid"><div class="c4"><label>Type</label><select id="techType"><option>Évacuation finale</option><option>Arrivées d’eau</option><option>Prises / électricité</option><option>Hotte / ventilation</option><option>Gaz</option><option>Zone cachée / inaccessible</option></select></div><div class="c4"><label>Mur / zone</label><select id="techWall">${state.walls.map(w=>`<option>${w.name}</option>`).join('')}<option>Autre zone</option></select></div><div class="c4">${fileInput('techPhoto','Prendre photo technique')}</div><div class="c12"><label>Note</label><input id="techNote" placeholder="Ex : évacuation cachée derrière meuble..."></div></div><div class="inlineActions"><button class="blue" onclick="addTechPhoto()">+ Ajouter au relevé</button></div><div class="panel" style="margin-top:14px"><h3>Photos ajoutées</h3><div class="mini">${state.techPhotos.length?state.techPhotos.map((p,i)=>`<div class="item"><div><strong>${esc(p.type)} — ${esc(p.wall)}</strong><small>${esc(p.note||'Sans note')}</small></div><button class="red small" onclick="state.techPhotos.splice(${i},1);render()">×</button></div>`).join(''):'<div class="hint">Aucune photo technique ajoutée.</div>'}</div></div>`}
function screenValidation(){return `${head('ÉTAPE 9 / 10','Validation','Le relevé est construit. On corrige seulement les points orange ou rouges.')}${big('✅','Contrôle final','Vérifie la vue de dessus, les longueurs retenues, et les points à confirmer.')}<div class="grid"><div class="c6"><div class="plan">${planSVG()}</div></div><div class="c6"><div class="panel"><h3>Murs</h3><table><thead><tr><th>Mur</th><th>Longueur</th><th>Fiabilité</th></tr></thead><tbody>${state.walls.map(w=>`<tr><td>${w.name}</td><td>${esc(finalLen(w)||'à mesurer')} m</td><td>${confText(w)}</td></tr>`).join('')}</tbody></table></div></div></div><div class="facades">${state.walls.map(w=>`<div class="panel"><h3>Façade mur ${w.name}</h3>${facadeSVG(w)}</div>`).join('')}</div><div class="grid" style="margin-top:14px"><div class="c12"><label>Points à confirmer</label><textarea id="notes">${esc(state.notes)}</textarea></div><div class="c12"><label>Réserve automatique / ajustable</label><textarea id="reserve">${esc(state.reserve||defaultReserve())}</textarea></div></div><div class="inlineActions noPrint"><button class="green" onclick="saveLocal()">Enregistrer</button><button class="secondary" onclick="exportJSON()">Exporter JSON</button></div>`}
function screenReport(){return `<div class="noPrint">${head('ÉTAPE 10 / 10','Rapport final','Imprime en PDF depuis le navigateur ou exporte le JSON.')}${big('📄','Rapport prêt','Sur téléphone, utilise le partage ou l’impression du navigateur pour enregistrer en PDF.')}</div>${reportHTML()}`}
function fileInput(id,label,msg=''){return `<label>${label}</label><input id="${id}" type="file" accept="image/*" capture="environment"><div class="sub">${msg}</div>`}
function stage(mode,i=null){const d=mode==='calib'?{src:state.calib.src,points:state.calib.points}:{src:state.activePhoto==='top'?state.walls[i].top:state.walls[i].main,points:state.walls[i].points.filter(p=>p.photo===state.activePhoto)};return `<div class="stage" id="stage">${d.src?`<img src="${d.src}" alt="photo">${lines(d.points)}${d.points.map((p,k)=>pointHTML(p,k)).join('')}`:'<div class="empty">Aucune photo chargée<br><small>Appuie sur le champ photo au-dessus</small></div>'}</div>`}
function pointHTML(p,k){const t=tools[p.type]||tools.hidden;return `<div class="pt ${t.c}" style="left:${p.x}%;top:${p.y}%" onclick="delPoint(event,${k})" title="${esc(t.l)}">${t.i}</div>`}
function lines(points){const get=t=>points.find(p=>p.type===t);let out='';[['rule1','rule2','#0ea5e9'],['wall1','wall2','#10213f']].forEach(([a,b,c])=>{const p1=get(a),p2=get(b);if(p1&&p2)out+=`<line x1="${p1.x}%" y1="${p1.y}%" x2="${p2.x}%" y2="${p2.y}%" stroke="${c}" stroke-width="3" stroke-dasharray="7 5"/>`});return `<svg class="overlay">${out}</svg>`}
function toolPanel(mode,i=null){return `<div class="panel"><h3>Repère à placer</h3><div class="tools">${Object.entries(tools).map(([k,t])=>`<button class="${state.tool===k?'active':''}" onclick="state.tool='${k}';render()">${t.i} ${t.l}</button>`).join('')}</div>${mode==='wall'?`<div class="tabs" style="margin-top:10px"><button class="tab ${state.activePhoto==='main'?'active':''}" onclick="state.activePhoto='main';render()">Photo bas</button><button class="tab ${state.activePhoto==='top'?'active':''}" onclick="state.activePhoto='top';render()">Photo haut</button></div>`:''}<div class="hint" style="margin-top:12px">Clique sur l’image pour placer le repère sélectionné. Clique sur un repère pour le supprimer.</div></div>`}
function calibStats(){const s=scale(state.calib.points);return `<div class="stats"><div class="stat"><span>Calibration</span><b>${s?Math.round(s)+' px/m':'—'}</b></div><div class="stat"><span>Règle</span><b>${s?'OK':'à placer'}</b></div><div class="stat"><span>Photo</span><b>${state.calib.src?'OK':'—'}</b></div></div>`}
function wallStats(i){const w=state.walls[i],a=estimate(w);if(a&&!w.auto){w.auto=a.toFixed(2);if(!w.manual)w.final=w.auto}const need=w.confidence==='red'||!a||w.needMeasure;return `<div class="stats"><div class="stat"><span>Estimé photo</span><b>${a?a.toFixed(2)+' m':'—'}</b></div><div class="stat"><span>Retenu</span><b>${finalLen(w)||'—'} m</b></div><div class="stat"><span>Action</span><b>${need?'Mesurer':'OK'}</b></div></div>${need?'<div class="hint orangeBox" style="margin-top:10px"><b>Mesure demandée :</b> mesure seulement ce mur au laser/mètre et saisis la valeur.</div>':'<div class="hint ok" style="margin-top:10px"><b>Photo exploitable :</b> tu peux valider ou saisir une mesure laser pour verrouiller.</div>'}`}
function bind(){['client','adresse','date','tech','etat','comment'].forEach(id=>{const e=$(id);if(e)e.oninput=()=>state.project[id]=e.value});document.querySelectorAll('[data-prep]').forEach(c=>c.onchange=()=>{state.prep[c.dataset.prep]=c.checked;render()});const ci=$('calibInput');if(ci)ci.onchange=e=>readCompress(e,s=>{state.calib.src=s;state.calib.points=[];render()});const wm=$('wallMain');if(wm)wm.onchange=e=>readCompress(e,s=>{state.walls[state.step-3].main=s;state.activePhoto='main';render()});const wt=$('wallTop');if(wt)wt.onchange=e=>readCompress(e,s=>{state.walls[state.step-3].top=s;state.activePhoto='top';render()});const tp=$('techPhoto');if(tp)tp.onchange=e=>readCompress(e,s=>{tp.dataset.img=s});const st=$('stage');if(st)st.onclick=placePoint;const m=$('manual');if(m)m.oninput=()=>{let w=state.walls[state.step-3];w.manual=m.value;w.final=m.value;if(m.value)w.needMeasure=false};const an=$('angle');if(an)an.oninput=()=>state.walls[state.step-3].angle=an.value;const wn=$('wallNotes');if(wn)wn.oninput=()=>state.walls[state.step-3].notes=wn.value;const no=$('notes');if(no)no.oninput=()=>state.notes=no.value;const re=$('reserve');if(re)re.oninput=()=>state.reserve=re.value}
function readCompress(e,cb){const f=e.target.files&&e.target.files[0];if(!f)return;loader(true);const reader=new FileReader();reader.onload=()=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height,ratio=Math.min(1,MAX_IMAGE/Math.max(w,h));let cw=Math.round(w*ratio),ch=Math.round(h*ratio);const canvas=document.createElement('canvas');canvas.width=cw;canvas.height=ch;const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,cw,ch);let data=canvas.toDataURL('image/jpeg',QUALITY);loader(false);cb(data)};img.onerror=()=>{loader(false);alert('Photo non lisible par le navigateur. Essaie de la reprendre en JPG.');};img.src=reader.result};reader.readAsDataURL(f)}
function loader(on){$('loader').classList.toggle('on',!!on)}
function placePoint(e){if(e.target.classList.contains('pt'))return;const st=$('stage');if(!st||!st.querySelector('img'))return;const r=st.getBoundingClientRect();let p={type:state.tool,x:((e.clientX-r.left)/r.width*100).toFixed(2),y:((e.clientY-r.top)/r.height*100).toFixed(2),label:''};if(['evac','water','elec','window','door','hidden','hot','gaz'].includes(p.type)){const note=prompt('Note pour ce repère',tools[p.type].l);if(note===null)return;p.label=note}if(state.step===2){if(['rule1','rule2'].includes(p.type))state.calib.points=state.calib.points.filter(x=>x.type!==p.type);state.calib.points.push(p)}else if(state.step>=3&&state.step<=6){let w=state.walls[state.step-3];p.photo=state.activePhoto;if(['rule1','rule2','wall1','wall2'].includes(p.type))w.points=w.points.filter(x=>!(x.type===p.type&&x.photo===state.activePhoto));w.points.push(p);let a=estimate(w);if(a){w.auto=a.toFixed(2);if(!w.manual)w.final=w.auto}else w.needMeasure=true}render()}
function delPoint(e,k){e.stopPropagation();if(state.step===2)state.calib.points.splice(k,1);else{let w=state.walls[state.step-3];let pts=w.points.filter(p=>p.photo===state.activePhoto);let target=pts[k];let idx=w.points.indexOf(target);if(idx>=0)w.points.splice(idx,1)}render()}
function dist(a,b){return Math.hypot(num(a.x)-num(b.x),num(a.y)-num(b.y))}function scale(points){const a=points.find(p=>p.type==='rule1'),b=points.find(p=>p.type==='rule2');return a&&b?dist(a,b):0}
function estimate(w){let pts=w.points.filter(p=>p.photo==='main');let sc=scale(pts)||scale(state.calib.points);const a=pts.find(p=>p.type==='wall1'),b=pts.find(p=>p.type==='wall2');return sc&&a&&b?dist(a,b)/sc:0}
function finalLen(w){return w.manual||w.auto||w.final||''}function confText(w){return w.confidence==='green'?'Fiable':w.confidence==='red'?'Non mesurable':'À confirmer'}function setConf(i,c){state.walls[i].confidence=c;if(c==='red')state.walls[i].needMeasure=true;render()}function markHidden(i){let w=state.walls[i];w.confidence='red';w.needMeasure=true;w.notes=w.notes||'Zone cachée / mesure à confirmer';render()}
function validateWall(i,move){let w=state.walls[i],a=estimate(w);if(w.manual)w.final=w.manual;else if(a)w.final=a.toFixed(2);if(!w.final&&w.confidence!=='red')return alert('Il manque une longueur ou une mesure de contrôle.');w.validated=true;if(move) i<3?go(i+4):go(7);else render()}
function addTechPhoto(){const inp=$('techPhoto');const src=inp&&inp.dataset.img;if(!src)return alert('Ajoute d’abord une photo.');state.techPhotos.push({type:$('techType').value,wall:$('techWall').value,note:$('techNote').value,src});render()}
function planSVG(){let pts=[{x:0,y:0}],x=0,y=0,dir=0;state.walls.forEach(w=>{let L=num(finalLen(w))||1;x+=L*Math.cos(dir*Math.PI/180);y+=L*Math.sin(dir*Math.PI/180);pts.push({x,y});dir+=num(w.angle)||90});let xs=pts.map(p=>p.x),ys=pts.map(p=>p.y),minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys),W=620,H=360,pad=48,sc=Math.min((W-2*pad)/Math.max(.1,maxX-minX),(H-2*pad)/Math.max(.1,maxY-minY)),tx=v=>pad+(v-minX)*sc,ty=v=>H-pad-(v-minY)*sc,out='';for(let i=0;i<pts.length-1;i++){let a=pts[i],b=pts[i+1],w=state.walls[i];out+=`<line x1="${tx(a.x)}" y1="${ty(a.y)}" x2="${tx(b.x)}" y2="${ty(b.y)}" stroke="#10213f" stroke-width="5" stroke-linecap="round"/><text x="${(tx(a.x)+tx(b.x))/2}" y="${(ty(a.y)+ty(b.y))/2-10}" text-anchor="middle" font-size="13" font-weight="900" fill="#172033">Mur ${w.name} — ${esc(finalLen(w)||'?')} m</text>`}let gap=Math.hypot(pts[0].x-pts[pts.length-1].x,pts[0].y-pts[pts.length-1].y);return `<svg viewBox="0 0 ${W} ${H}"><rect width="${W}" height="${H}" fill="#fbfdff"/>${out}${gap>.35?`<text x="20" y="335" fill="#d92d20" font-size="13" font-weight="900">Contour non fermé : ${gap.toFixed(2)} m d’écart. À contrôler.</text>`:''}</svg>`}
function color(t){return {evac:'#d92d20',water:'#06b6d4',elec:'#7c3aed',window:'#14b8a6',door:'#795548',hidden:'#111827',hot:'#64748b',gaz:'#f59e0b'}[t]||'#1f5eff'}
function facadeSVG(w){let W=460,H=245,pad=34,items='';w.points.filter(p=>['evac','water','elec','window','door','hidden','hot','gaz'].includes(p.type)).forEach(p=>{let t=tools[p.type],x=pad+num(p.x)/100*(W-2*pad),y=pad+num(p.y)/100*(H-2*pad);items+=`<circle cx="${x}" cy="${y}" r="12" fill="${color(p.type)}" stroke="#fff" stroke-width="3"/><text x="${x}" y="${y+4}" text-anchor="middle" font-size="10" font-weight="900" fill="#fff">${t.i}</text><text x="${x}" y="${y-16}" text-anchor="middle" font-size="10" font-weight="800" fill="#172033">${esc(t.l)}</text>`});return `<svg viewBox="0 0 ${W} ${H}"><rect width="${W}" height="${H}" rx="14" fill="#fff" stroke="#dbe3ef"/><line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="#10213f" stroke-width="4"/><text x="${W/2}" y="${H-8}" text-anchor="middle" font-size="12" font-weight="900" fill="#657187">Mur ${w.name} — ${esc(finalLen(w)||'?')} m</text>${items}</svg>`}
function hasEvac(){return state.walls.some(w=>w.points.some(p=>p.type==='evac'))||state.techPhotos.some(p=>p.type==='Évacuation finale')}function defaultReserve(){return `Le relevé technique a été réalisé avec une méthode photo-guidée dans une cuisine pouvant être encombrée ou avec cuisine existante en place. Certaines zones peuvent être restées partiellement visibles ou inaccessibles. Les mesures automatiques ou assistées ont été validées ou corrigées par mesure manuelle lorsque nécessaire.\n\nL’évacuation finale constitue la contrainte prioritaire pour le raccordement de l’évier, du lave-vaisselle et/ou du lave-linge. ${hasEvac()?'Elle a été repérée dans le relevé photo.':'Elle n’a pas été clairement repérée : son emplacement devra être confirmé avant travaux ou après dépose.'}`}
function reportHTML(){state.reserve=state.reserve||defaultReserve();let tech=state.techPhotos.map(p=>`<div class="reportBlock"><h3>${esc(p.type)} — ${esc(p.wall)}</h3><img src="${p.src}" style="width:100%;max-height:340px;object-fit:contain;border:1px solid #e5e7eb;border-radius:12px;background:#f3f4f6"><p>${esc(p.note||'')}</p></div>`).join('');return `<div class="reportSheet"><div class="reportTitle"><h2>Relevé technique cuisine</h2><p>${esc(state.project.client||'Client non renseigné')} — ${esc(state.project.adresse||'Adresse non renseignée')}</p></div><div class="reportBody"><div class="reportGrid"><div class="reportBlock"><h3>Infos chantier</h3><div class="kv"><b>Client</b><span>${esc(state.project.client)}</span><b>Adresse</b><span>${esc(state.project.adresse)}</span><b>Date</b><span>${esc(state.project.date)}</span><b>Technicien</b><span>${esc(state.project.tech)}</span><b>État</b><span>${esc(state.project.etat)}</span></div></div><div class="reportBlock"><h3>Synthèse</h3><ul><li>Murs renseignés : ${state.walls.filter(w=>finalLen(w)).length}/${state.walls.length}</li><li>Évacuation finale : ${hasEvac()?'repérée':'à confirmer'}</li><li>Photos techniques : ${state.techPhotos.length}</li></ul></div></div><div class="reportBlock"><h3>Vue de dessus</h3>${planSVG()}</div><div class="reportBlock"><h3>Murs</h3><ul>${state.walls.map(w=>`<li><b>Mur ${w.name}</b> : ${esc(finalLen(w)||'à mesurer')} m — angle après : ${esc(w.angle)}° — fiabilité : ${confText(w)}${w.notes?' — '+esc(w.notes):''}</li>`).join('')}</ul></div><div class="reportGrid">${state.walls.map(w=>`<div class="reportBlock"><h3>Façade mur ${w.name}</h3>${facadeSVG(w)}</div>`).join('')}</div>${tech?`<div class="reportGrid">${tech}</div>`:''}<div class="reportBlock"><h3>Réserves</h3><p style="white-space:pre-line;line-height:1.45">${esc(state.reserve)}</p></div><div class="reportBlock"><h3>Points à confirmer</h3><p style="white-space:pre-line;line-height:1.45">${esc(state.notes||'Aucun point complémentaire renseigné.')}</p></div></div></div>`}
function saveLocal(){try{localStorage.setItem(STORAGE,JSON.stringify(state));alert('Relevé enregistré dans ce navigateur.')}catch(e){alert('Sauvegarde impossible : trop de photos. Exporte le JSON ou supprime quelques photos.')}}function loadLocal(){let raw=localStorage.getItem(STORAGE);if(!raw)return alert('Aucune sauvegarde.');state=JSON.parse(raw);render()}function exportJSON(){let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='releve_photo_guide_'+(state.project.client||'client').replace(/[^a-zA-Z0-9]+/g,'_')+'.json';a.click();URL.revokeObjectURL(a.href)}function resetAll(){if(confirm('Effacer ce relevé ?')){localStorage.removeItem(STORAGE);state={step:0,tool:'rule1',activePhoto:'main',project:{client:'',adresse:'',date:new Date().toISOString().slice(0,10),tech:'',etat:'Cuisine existante en place / encombrée',comment:''},prep:{angles:false,ruleFloor:false,ruleVertical:false,evacMarker:false,light:false},calib:{src:'',points:[]},walls:[],techPhotos:[],notes:'',reserve:''};initWalls();render()}}
render();
</script>
