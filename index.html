<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Assistant relevé cuisine - V0.5 A4</title>
  <style>
    :root{
      --bg:#f5f7fb;--card:#fff;--ink:#142033;--muted:#667085;--line:#dce5f2;
      --blue:#1f5eff;--blue2:#eaf0ff;--green:#119c63;--green2:#e8f8f0;
      --orange:#f59e0b;--orange2:#fff7e6;--red:#d92d20;--red2:#fff0ed;--dark:#10213f;
      --shadow:0 14px 34px rgba(20,32,51,.10);--r:22px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#edf4ff 0,var(--bg) 330px);color:var(--ink)}
    header{position:sticky;top:0;z-index:50;background:rgba(245,247,251,.94);backdrop-filter:blur(14px);border-bottom:1px solid rgba(220,229,242,.92)}
    .top{max-width:1080px;margin:auto;padding:12px 14px}.title{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.title h1{font-size:18px;margin:0;letter-spacing:-.02em}.ver{font-size:11px;font-weight:900;color:var(--blue);white-space:nowrap}.sub{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.3}
    .progress{height:10px;background:#e6edf8;border-radius:999px;overflow:hidden;margin-top:10px}.progress div{height:100%;width:0;background:linear-gradient(90deg,var(--blue),#14b8a6);transition:.25s}
    main{max-width:1080px;margin:18px auto 96px;padding:0 14px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:18px}.kicker{display:inline-flex;background:var(--blue2);color:#0d3ec9;border:1px solid #c8d6ff;border-radius:999px;padding:7px 11px;font-size:12px;font-weight:900;margin-bottom:10px}h2{font-size:26px;margin:0;letter-spacing:-.03em}.lead{color:var(--muted);line-height:1.45;margin:8px 0 0}.big{background:var(--dark);color:white;border-radius:20px;padding:18px;margin:16px 0;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center}.big .ico{font-size:44px}.big b{display:block;font-size:19px;margin-bottom:4px}.big span{display:block;color:#cfdaee;line-height:1.42}
    button{border:0;border-radius:999px;padding:13px 16px;background:var(--ink);color:white;font-weight:900;cursor:pointer;box-shadow:0 8px 18px rgba(20,32,51,.15);font-size:15px}button.secondary{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:none}button.blue{background:var(--blue)}button.green{background:var(--green)}button.red{background:var(--red)}button.orange{background:var(--orange);color:#2b1b00}button.small{padding:8px 10px;border-radius:12px;font-size:12px;box-shadow:none}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}.c12{grid-column:span 12}.c8{grid-column:span 8}.c6{grid-column:span 6}.c4{grid-column:span 4}.c3{grid-column:span 3}.c2{grid-column:span 2}
    label{display:block;margin:0 0 6px;color:#344054;font-weight:900;font-size:12px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:15px;padding:13px 12px;background:#fff;color:var(--ink);font:inherit;outline:none}textarea{min-height:96px;resize:vertical;line-height:1.45}input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(31,94,255,.10)}
    .hint{background:#f8fbff;border:1px dashed #c8d5ea;color:#40506a;border-radius:16px;padding:13px 14px;line-height:1.45;font-size:14px}.warn{background:var(--red2);border-color:#ffc9c1;color:#8b2117}.ok{background:var(--green2);border-color:#bfe8d2;color:#086b43}.orangeBox{background:var(--orange2);border-color:#ffe0a3;color:#765000}
    .checks{display:grid;grid-template-columns:1fr;gap:10px}.check{border:1px solid var(--line);background:white;border-radius:18px;padding:14px;display:flex;gap:12px;cursor:pointer}.check input{width:auto;margin-top:4px}.check b{display:block}.check small{display:block;color:var(--muted);line-height:1.35;margin-top:4px}.check.on{background:var(--green2);border-color:#a7e0c2}
    .photoBox{display:grid;grid-template-columns:1fr;gap:14px}.stage{min-height:410px;background:#eef3fb;border:1px dashed #b9c7da;border-radius:20px;overflow:hidden;position:relative;display:grid;place-items:center;touch-action:manipulation}.stage img{width:100%;height:100%;max-height:560px;object-fit:contain;background:#e9eef6;display:block}.empty{text-align:center;color:#657187;font-weight:900;padding:26px;line-height:1.35}.overlay{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none}.pt{position:absolute;transform:translate(-50%,-50%);width:36px;height:36px;border-radius:50%;display:grid;place-items:center;border:3px solid white;color:white;font-size:11px;font-weight:900;box-shadow:0 7px 18px rgba(0,0,0,.30);cursor:pointer}.start{background:#16a34a}.r1{background:#2563eb}.r2{background:#7c3aed}.end{background:#ef4444}.hiddenPt{background:#111827}.evac{background:#d92d20}.water{background:#06b6d4}.elec{background:#f59e0b;color:#211300}.hot{background:#64748b}.gaz{background:#f97316}.window{background:#14b8a6}.door{background:#795548}.a4{background:#0ea5e9}.measure{background:#10213f}
    .tools{display:grid;grid-template-columns:1fr 1fr;gap:8px}.tools button{background:white;color:var(--ink);border:1px solid var(--line);box-shadow:none;text-align:left;border-radius:14px;font-size:13px;padding:10px}.tools button.active{background:var(--blue);color:white;border-color:var(--blue)}.panel{border:1px solid var(--line);border-radius:18px;background:#fbfdff;padding:14px}.panel h3{font-size:16px;margin:0 0 10px}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{background:white!important;color:var(--ink)!important;border:1px solid var(--line)!important;box-shadow:none!important}.tab.active{background:var(--blue)!important;color:white!important;border-color:var(--blue)!important}.tab.done{border-color:#a7e0c2!important;background:var(--green2)!important;color:#0b6b43!important}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}.stat{background:white;border:1px solid var(--line);border-radius:16px;padding:12px}.stat span{display:block;color:var(--muted);font-size:12px;font-weight:800}.stat b{font-size:20px}.tag{display:inline-flex;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900}.tag.green{background:var(--green2);color:var(--green);border:1px solid #bfe8d2}.tag.orange{background:var(--orange2);color:#8a5b00;border:1px solid #ffe0a3}.tag.red{background:var(--red2);color:var(--red);border:1px solid #ffc9c1}.tag.blue{background:var(--blue2);color:#0d3ec9;border:1px solid #c8d6ff}
    .bottomNav{position:fixed;left:0;right:0;bottom:0;z-index:60;background:rgba(245,247,251,.95);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:10px 12px calc(10px + env(safe-area-inset-bottom));display:flex;gap:8px;justify-content:center}.bottomNav button{min-width:110px}.bottomNav .mainBtn{flex:1;max-width:340px}.inlineActions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.mini{display:flex;flex-direction:column;gap:8px;max-height:280px;overflow:auto}.item{display:flex;justify-content:space-between;gap:8px;border:1px solid var(--line);border-radius:14px;background:white;padding:10px}.item strong{font-size:13px}.item small{display:block;color:var(--muted);line-height:1.35;margin-top:3px}
    .segments{display:flex;flex-direction:column;gap:8px}.seg{display:grid;grid-template-columns:1fr 120px auto;gap:8px;align-items:end;background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px}.plan{min-height:330px;border:1px solid var(--line);border-radius:20px;background:linear-gradient(45deg,#fff,#f8fbff);display:grid;place-items:center;overflow:hidden}.facades{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}table{width:100%;border-collapse:separate;border-spacing:0 8px}th{text-align:left;color:var(--muted);font-size:12px;padding:0 8px}td{background:#f9fbfe;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:8px}td:first-child{border-left:1px solid var(--line);border-radius:13px 0 0 13px}td:last-child{border-right:1px solid var(--line);border-radius:0 13px 13px 0}
    .a4cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.a4card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;min-height:120px}.a4card b{font-size:20px}.a4card span{display:block;color:var(--muted);font-size:13px;margin-top:6px}.arrow{font-size:36px;font-weight:900;color:var(--blue)}
    .reportSheet{max-width:980px;margin:auto;border:1px solid #e5e7eb;border-radius:18px;overflow:hidden;background:white}.reportTitle{padding:22px;background:#10213f;color:white}.reportTitle h2{font-size:26px;margin:0}.reportTitle p{color:#cdd7ea;margin:5px 0 0}.reportBody{padding:22px;display:flex;flex-direction:column;gap:16px}.reportGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.reportBlock{border:1px solid #e5e7eb;border-radius:14px;padding:14px;background:white}.reportBlock h3{margin:0 0 10px;color:#10213f}.kv{display:grid;grid-template-columns:160px 1fr;gap:6px 10px;font-size:14px}.kv b{color:#4b5563}.reportBlock ul{margin:0;padding-left:20px}.reportBlock li{margin:4px 0;line-height:1.35}.reportPhotos{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.reportPhotos img{width:100%;max-height:260px;object-fit:contain;border:1px solid #e5e7eb;border-radius:12px;background:#f3f4f6}
    .loader{display:none;position:fixed;inset:0;z-index:100;background:rgba(16,33,63,.62);place-items:center;color:white;font-weight:900}.loader.on{display:grid}.spin{width:44px;height:44px;border:5px solid rgba(255,255,255,.35);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}@keyframes spin{to{transform:rotate(360deg)}}
    @media(min-width:900px){.photoBox{grid-template-columns:1.1fr .9fr}.checks{grid-template-columns:1fr 1fr}.title h1{font-size:20px}.a4cards{grid-template-columns:repeat(4,1fr)}}
    @media(max-width:760px){main{margin-top:12px;padding:0 10px}.card{padding:15px;border-radius:20px}h2{font-size:24px}.big{padding:15px}.big .ico{font-size:36px}.c8,.c6,.c4,.c3,.c2{grid-column:span 12}.stats{grid-template-columns:1fr}.facades,.reportGrid,.reportPhotos,.a4cards{grid-template-columns:1fr}.stage{min-height:350px}.tools{grid-template-columns:1fr}.reportBody{padding:14px}.kv{grid-template-columns:1fr}.bottomNav button{min-width:88px;padding:12px 10px}.seg{grid-template-columns:1fr}}
    @media print{body{background:white}header,.bottomNav,.noPrint,.loader{display:none!important}main{display:block;max-width:none;margin:0;padding:0}.card{box-shadow:none;border:0;padding:0}.reportSheet{max-width:none;border:0;border-radius:0}.reportTitle{background:#10213f!important;color:white!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}}
  </style>
</head>
<body>
<header>
  <div class="top">
    <div class="title">
      <div><h1>Assistant relevé cuisine <span class="ver">V0.5 A4</span></h1><div class="sub" id="stepSub">Grand public - feuilles A4, photos de gauche à droite, segments si besoin</div></div>
      <div class="noPrint"><button class="secondary small" onclick="saveLocal()">Sauver</button><button class="secondary small" onclick="exportJSON()">JSON</button><button class="red small" onclick="resetAll()">Reset</button></div>
    </div>
    <div class="progress"><div id="bar"></div></div>
  </div>
</header>
<main><section class="card" id="app"></section></main>
<div class="bottomNav noPrint"><button class="secondary" onclick="prev()">Retour</button><button class="blue mainBtn" onclick="nextAction()" id="nextBtn">Continuer</button></div>
<div class="loader" id="loader"><div><div class="spin"></div><div>Compression de la photo...</div></div></div>
<script>
const VERSION='V0.5-A4';
const STORAGE='cbat_releve_cuisine_a4_v05';
const MAX_IMAGE=1600;
const QUALITY=.72;
const steps=['Dossier','Feuilles A4','Mur A','Mur B','Mur C','Mur D','Technique','Validation','Rapport'];
const photoParts={left:'Photo gauche',center:'Photo centre',right:'Photo droite',detail:'Photo detail / haut'};
const tools={
  start:{l:'Feuille DEPART',i:'DEP',c:'start'},r1:{l:'Feuille R1',i:'R1',c:'r1'},r2:{l:'Feuille R2',i:'R2',c:'r2'},end:{l:'Feuille FIN',i:'FIN',c:'end'},hidden:{l:'Feuille CACHE',i:'?',c:'hiddenPt'},
  a4a:{l:'Coin A4 A',i:'A4A',c:'a4'},a4b:{l:'Coin A4 B',i:'A4B',c:'a4'},m1:{l:'Point mesure 1',i:'M1',c:'measure'},m2:{l:'Point mesure 2',i:'M2',c:'measure'},
  evac:{l:'Evacuation',i:'EV',c:'evac'},water:{l:'Eau',i:'EAU',c:'water'},elec:{l:'Prise / elec.',i:'ELEC',c:'elec'},hot:{l:'Hotte',i:'HOT',c:'hot'},gaz:{l:'Gaz',i:'GAZ',c:'gaz'},window:{l:'Fenetre',i:'FEN',c:'window'},door:{l:'Porte',i:'POR',c:'door'}
};
let state={step:0,tool:'start',activePart:'left',project:{client:'',adresse:'',date:new Date().toISOString().slice(0,10),tech:'',etat:'Cuisine existante en place / encombrée',comment:''},prep:{draw:false,start:false,raccord:false,hidden:false,technical:false,light:false},walls:[],techPhotos:[],notes:'',reserve:''};
function newWall(i){return {name:String.fromCharCode(65+i),photoMode:'multi',measureMode:'segments',a4Side:'long',photos:{left:'',center:'',right:'',detail:''},points:[],a4Estimate:'',manual:'',segments:[{label:'Départ -> R1',value:''},{label:'R1 -> R2 / centre',value:''},{label:'R2 -> FIN',value:''}],final:'',angle:90,confidence:'orange',needMeasure:false,validated:false,notes:'',hiddenBy:''};}
function initWalls(){state.walls=Array.from({length:4},(_,i)=>newWall(i));}
initWalls();
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
const num=v=>{const x=parseFloat(String(v).replace(',','.'));return isFinite(x)?x:0};
function render(){document.getElementById('bar').style.width=Math.round(progress()*100)+'%';document.getElementById('stepSub').textContent=`Étape ${state.step+1}/9 - ${steps[state.step]}`;const a=$('app');if(state.step===0)a.innerHTML=screenInfo();if(state.step===1)a.innerHTML=screenA4();if(state.step>=2&&state.step<=5)a.innerHTML=screenWall(state.step-2);if(state.step===6)a.innerHTML=screenTech();if(state.step===7)a.innerHTML=screenValidation();if(state.step===8)a.innerHTML=screenReport();bind();updateNextLabel();}
function progress(){let d=0;for(let i=0;i<8;i++)if(done(i))d++;return d/8}
function done(i){if(i===0)return !!state.project.client;if(i===1)return Object.values(state.prep).filter(Boolean).length>=4;if(i>=2&&i<=5){const w=state.walls[i-2];return hasWallPhoto(w)&&(!!finalLen(w)||w.needMeasure||w.measureMode==='unknown')}if(i===6)return state.techPhotos.length>0;if(i===7)return state.walls.some(w=>w.validated)||state.walls.some(w=>finalLen(w));return false}
function hasWallPhoto(w){return Object.values(w.photos).some(Boolean)}
function go(i){state.step=Math.max(0,Math.min(8,i));render();scrollTo({top:0,behavior:'smooth'})}
function prev(){go(state.step-1)}
function nextAction(){if(state.step===8){window.print();return} if(state.step>=2&&state.step<=5){validateWall(state.step-2,true);return} if(state.step===7){go(8);return} go(state.step+1)}
function updateNextLabel(){const b=$('nextBtn');if(state.step===8)b.textContent='Imprimer / PDF';else if(state.step>=2&&state.step<=5)b.textContent='Valider ce mur';else if(state.step===7)b.textContent='Générer rapport';else b.textContent='Continuer'}
function head(k,t,l){return `<div class="kicker">${k}</div><h2>${t}</h2><p class="lead">${l}</p>`}
function big(icon,title,text){return `<div class="big"><div class="ico">${icon}</div><div><b>${title}</b><span>${text}</span></div></div>`}
function screenInfo(){return `${head('ÉTAPE 1 / 9','Dossier chantier','Version grand public : feuilles A4 + téléphone. Pas de pige de 1 mètre.')}${big('🧭','Principe simple','Une feuille A4 = un repère. DÉPART, R1, R2, FIN ou CACHÉ. R1 et R2 servent uniquement à raccorder plusieurs photos du même mur.')}
<div class="grid"><div class="c4"><label>Client</label><input id="client" value="${esc(state.project.client)}" placeholder="Nom client"></div><div class="c4"><label>Adresse</label><input id="adresse" value="${esc(state.project.adresse)}" placeholder="Adresse chantier"></div><div class="c2"><label>Date</label><input id="date" type="date" value="${esc(state.project.date)}"></div><div class="c2"><label>Technicien / utilisateur</label><input id="tech" value="${esc(state.project.tech)}" placeholder="Nom"></div><div class="c4"><label>État de la pièce</label><select id="etat"><option ${state.project.etat==='Cuisine existante en place / encombrée'?'selected':''}>Cuisine existante en place / encombrée</option><option ${state.project.etat==='Cuisine vide'?'selected':''}>Cuisine vide</option><option ${state.project.etat==='Cuisine en cours de dépose'?'selected':''}>Cuisine en cours de dépose</option></select></div><div class="c8"><label>Commentaire départ</label><input id="comment" value="${esc(state.project.comment)}" placeholder="Ex : cuisine encombrée, frigo dans l’angle..."></div></div><div class="inlineActions noPrint"><button class="secondary" onclick="loadLocal()">Recharger sauvegarde</button><button class="secondary" onclick="saveLocal()">Enregistrer</button><button class="secondary" onclick="exportJSON()">Exporter JSON</button></div>`}
function screenA4(){const items=[['draw','Feuilles préparées','Écrire en gros : DÉPART, R1, R2, FIN, CACHÉ, ÉVAC, EAU, PRISE.'],['start','Départ / fin','DÉPART au début du mur, FIN à la fin visible.'],['raccord','Raccords R1 / R2','R1 visible sur deux photos. R2 seulement si trois photos sont nécessaires.'],['hidden','Zones cachées','CACHÉ devant un frigo, un meuble, un angle inaccessible.'],['technical','Feuilles techniques','ÉVAC, EAU, PRISE, GAZ ou HOTTE près des éléments concernés.'],['light','Photos lisibles','Lumière allumée, feuilles nettes, zones qui se chevauchent.']];return `${head('ÉTAPE 2 / 9','Prépare les feuilles A4','Tout le monde peut le faire : papier A4, gros feutre noir, téléphone.')}${big('📄','Une feuille = un repère','Ne mélange pas R1 et R2 sur la même feuille. R1 est un repère. R2 est un autre repère, utile seulement si le mur demande trois photos.')}
<div class="a4cards"><div class="a4card"><b>DÉPART</b><div class="arrow">→</div><span>Début du mur.</span></div><div class="a4card"><b>R1</b><div class="arrow">↔</div><span>Raccord photo 1 / photo 2.</span></div><div class="a4card"><b>R2</b><div class="arrow">↔</div><span>Raccord photo 2 / photo 3.</span></div><div class="a4card"><b>FIN</b><div class="arrow">←</div><span>Fin du mur visible.</span></div><div class="a4card"><b>CACHÉ</b><div class="arrow">?</div><span>Obstacle ou angle inaccessible.</span></div><div class="a4card"><b>ÉVAC</b><div class="arrow">⛔</div><span>Évacuation finale.</span></div><div class="a4card"><b>EAU</b><div class="arrow">💧</div><span>Arrivées d’eau.</span></div><div class="a4card"><b>PRISE</b><div class="arrow">⚡</div><span>Électricité.</span></div></div>
<div class="checks" style="margin-top:14px">${items.map(([k,t,d])=>`<label class="check ${state.prep[k]?'on':''}"><input type="checkbox" data-prep="${k}" ${state.prep[k]?'checked':''}><span><b>${t}</b><small>${d}</small></span></label>`).join('')}</div><div class="hint orangeBox" style="margin-top:14px"><b>Repère important :</b> une feuille A4 mesure 21 x 29,7 cm. Elle sert à se repérer et peut aider une estimation locale, mais la longueur finale reste à confirmer par longueur totale, segments ou “non mesurable”.</div>`}
function screenWall(i){const w=state.walls[i],name=w.name;return `${head(`ÉTAPE ${i+3} / 9`,`Mur ${name}`,'Commence par choisir combien de photos sont nécessaires pour ce mur.')}
<div style="display:flex;justify-content:space-between;gap:10px;align-items:center;margin-top:12px"><span class="tag ${w.confidence==='green'?'green':w.confidence==='red'?'red':'orange'}">${confText(w)}</span><span class="sub">${w.validated?'Mur validé':'En cours'}</span></div>${big('📸','Photos de gauche à droite','Si le mur ne rentre pas entier : photo gauche avec DÉPART + R1, photo centre avec R1 + R2, photo droite avec R2 + FIN ou CACHÉ.')}
<div class="panel"><h3>1. Combien de photos ?</h3><div class="tabs"><button class="tab ${w.photoMode==='one'?'active':''}" onclick="setPhotoMode(${i},'one')">1 photo</button><button class="tab ${w.photoMode==='two'?'active':''}" onclick="setPhotoMode(${i},'two')">2 photos</button><button class="tab ${w.photoMode==='three'?'active':''}" onclick="setPhotoMode(${i},'three')">3 photos</button><button class="tab ${w.photoMode==='hidden'?'active':''}" onclick="setPhotoMode(${i},'hidden')">Zone cachée</button></div>${photoInstruction(w)}</div>
<div class="panel" style="margin-top:12px"><h3>2. Prends les photos</h3>${photoPartTabs(w)}${photoInputs(w,i)}<div class="photoBox" style="margin-top:14px"><div>${stage('wall',i)}</div><div>${toolPanel('wall',i)}${a4EstimatePanel(w,i)}</div></div></div>
<div class="panel" style="margin-top:12px"><h3>3. Longueur du mur</h3>${measurePanel(w,i)}</div>
<div class="panel" style="margin-top:12px"><h3>4. Angle et réserve</h3><div class="grid"><div class="c4"><label>Angle après ce mur</label><select id="angleMode"><option value="90" ${String(w.angle)==='90'?'selected':''}>90° supposé</option><option value="confirm" ${String(w.angle)==='confirm'?'selected':''}>À confirmer</option><option value="hidden" ${String(w.angle)==='hidden'?'selected':''}>Angle masqué</option></select></div><div class="c8"><label>Note / zone cachée</label><input id="wallNotes" value="${esc(w.notes)}" placeholder="ex : frigo dans l’angle, fin du mur cachée..."></div></div><div class="inlineActions"><button class="green" onclick="setConf(${i},'green')">Fiable</button><button class="orange" onclick="setConf(${i},'orange')">À confirmer</button><button class="red" onclick="markHidden(${i})">Zone cachée</button></div></div>`}
function photoInstruction(w){if(w.photoMode==='one')return `<div class="hint ok" style="margin-top:10px">À placer : une feuille DÉPART et une feuille FIN visibles sur la même photo.</div>`;if(w.photoMode==='two')return `<div class="hint" style="margin-top:10px">À placer : DÉPART, R1, FIN. Photo gauche = DÉPART + R1. Photo droite = R1 + FIN.</div>`;if(w.photoMode==='three')return `<div class="hint" style="margin-top:10px">À placer : DÉPART, R1, R2, FIN. Photo gauche = DÉPART + R1. Centre = R1 + R2. Droite = R2 + FIN.</div>`;return `<div class="hint warn" style="margin-top:10px">À placer : feuille CACHÉ devant l’obstacle. Le rapport indiquera que la zone est à confirmer.</div>`}

function measurePanel(w,i){return `<div class="tabs"><button class="tab ${w.measureMode==='total'?'active':''}" onclick="setMeasureMode(${i},'total')">Longueur totale</button><button class="tab ${w.measureMode==='segments'?'active':''}" onclick="setMeasureMode(${i},'segments')">Segments</button><button class="tab ${w.measureMode==='a4'?'active':''}" onclick="setMeasureMode(${i},'a4')">Estimation A4</button><button class="tab ${w.measureMode==='unknown'?'active':''}" onclick="setMeasureMode(${i},'unknown')">Non mesurable</button></div>
${w.measureMode==='total'?`<div class="grid" style="margin-top:12px"><div class="c6"><label>Longueur totale mesurée</label><input id="manual" type="number" step="0.01" value="${esc(w.manual)}" placeholder="ex : 4.82"></div><div class="c6"><div class="hint">Mesure du début visible du mur jusqu’à la fin visible. Si cela bloque, utilise “Segments”.</div></div></div>`:''}
${w.measureMode==='segments'?`<div class="hint" style="margin-top:12px"><b>Segments :</b> additionne les morceaux visibles. Exemple : DÉPART -> R1, R1 -> R2, R2 -> FIN.</div><div class="segments" style="margin-top:10px">${w.segments.map((s,idx)=>`<div class="seg"><div><label>Nom segment</label><input value="${esc(s.label)}" onchange="state.walls[${i}].segments[${idx}].label=this.value;render()"></div><div><label>Longueur m</label><input type="number" step="0.01" value="${esc(s.value)}" onchange="state.walls[${i}].segments[${idx}].value=this.value;updateSegmentTotal(${i});render()"></div><button class="red small" onclick="removeSegment(${i},${idx})">×</button></div>`).join('')}</div><div class="inlineActions"><button class="secondary" onclick="addSegment(${i})">Ajouter segment</button></div>`:''}

function a4EstimatePanel(w,i){return `<div class="panel" style="margin-top:12px"><h3>Estimation facultative par A4</h3><div class="grid"><div class="c6"><label>Côté A4 utilisé</label><select id="a4Side"><option value="long" ${w.a4Side==='long'?'selected':''}>Grand côté 29,7 cm</option><option value="short" ${w.a4Side==='short'?'selected':''}>Petit côté 21 cm</option></select></div><div class="c6"><div class="hint">Place A4A/A4B sur la feuille puis M1/M2 sur la distance à estimer.</div></div></div><div class="stats"><div class="stat"><span>Distance photo</span><b>${estimateA4(w)||'-'}</b></div><div class="stat"><span>Photo active</span><b>${photoParts[state.activePart]||'-'}</b></div><div class="stat"><span>Usage</span><b>Optionnel</b></div></div></div>`}
function screenTech(){return `${head('ÉTAPE 7 / 9','Photos techniques','On sécurise les points qui peuvent bloquer la cuisine.')}${big('⛔','Priorité absolue : évacuation finale','Pose une feuille ÉVAC près de l’évacuation finale si elle est visible. Sinon pose CACHÉ devant la zone.')}
<div class="grid"><div class="c4"><label>Type</label><select id="techType"><option>Évacuation finale</option><option>Arrivées d’eau</option><option>Prises / électricité</option><option>Hotte / ventilation</option><option>Gaz</option><option>Zone cachée / inaccessible</option></select></div><div class="c4"><label>Mur / zone</label><select id="techWall">${state.walls.map(w=>`<option>${w.name}</option>`).join('')}<option>Autre zone</option></select></div><div class="c4">${fileInput('techPhoto','Prendre photo technique')}</div><div class="c12"><label>Note</label><input id="techNote" placeholder="Ex : évacuation cachée derrière meuble..."></div></div><div class="inlineActions"><button class="blue" onclick="addTechPhoto()">Ajouter au relevé</button></div><div class="panel" style="margin-top:14px"><h3>Photos ajoutées</h3><div class="mini">${state.techPhotos.length?state.techPhotos.map((p,i)=>`<div class="item"><div><strong>${esc(p.type)} - ${esc(p.wall)}</strong><small>${esc(p.note||'Sans note')}</small></div><button class="red small" onclick="state.techPhotos.splice(${i},1);render()">×</button></div>`).join(''):'<div class="hint">Aucune photo technique ajoutée.</div>'}</div></div>`}
function screenValidation(){return `${head('ÉTAPE 8 / 9','Validation','Contrôle la vue de dessus, les longueurs retenues et les zones à confirmer.')}${big('✅','Contrôle final','Les feuilles A4 servent de repères. Les longueurs sont retenues depuis une mesure totale, des segments, une estimation A4 ou une réserve “non mesurable”.')}<div class="grid"><div class="c6"><div class="plan">${planSVG()}</div></div><div class="c6"><div class="panel"><h3>Murs</h3><table><thead><tr><th>Mur</th><th>Photos</th><th>Longueur</th><th>Fiabilité</th></tr></thead><tbody>${state.walls.map(w=>`<tr><td>${w.name}</td><td>${modeLabel(w)}</td><td>${esc(finalLen(w)||'à confirmer')} m</td><td>${confText(w)}</td></tr>`).join('')}</tbody></table></div></div></div><div class="facades">${state.walls.map(w=>`<div class="panel"><h3>Façade mur ${w.name}</h3>${facadeSVG(w)}</div>`).join('')}</div><div class="grid" style="margin-top:14px"><div class="c12"><label>Points à confirmer</label><textarea id="notes">${esc(state.notes)}</textarea></div><div class="c12"><label>Réserve automatique / ajustable</label><textarea id="reserve">${esc(state.reserve||defaultReserve())}</textarea></div></div><div class="inlineActions noPrint"><button class="green" onclick="saveLocal()">Enregistrer</button><button class="secondary" onclick="exportJSON()">Exporter JSON</button></div>`}
function screenReport(){return `<div class="noPrint">${head('ÉTAPE 9 / 9','Rapport final','Imprime en PDF depuis le navigateur ou exporte le JSON.')}${big('📄','Rapport prêt','Le rapport indique les feuilles A4 utilisées, les segments, les estimations et les zones non mesurables.')}</div>${reportHTML()}`}
function fileInput(id,label,msg=''){return `<label>${label}</label><input id="${id}" type="file" accept="image/*" capture="environment"><div class="sub">${msg}</div>`}
function stage(mode,i=null){const d={src:state.walls[i].photos[state.activePart]||'',points:state.walls[i].points.filter(p=>p.part===state.activePart)};return `<div class="stage" id="stage">${d.src?`<img src="${d.src}" alt="photo">${lines(d.points)}${d.points.map((p,k)=>pointHTML(p,k)).join('')}`:'<div class="empty">Aucune photo chargée<br><small>Appuie sur le champ photo au-dessus</small></div>'}</div>`}
function pointHTML(p,k){const t=tools[p.type]||tools.hidden;return `<div class="pt ${t.c}" style="left:${p.x}%;top:${p.y}%" onclick="delPoint(event,${k})" title="${esc(t.l)}">${t.i}</div>`}
function lines(points){const get=t=>points.find(p=>p.type===t);let out='';[['a4a','a4b','#0ea5e9'],['m1','m2','#10213f']].forEach(([a,b,c])=>{const p1=get(a),p2=get(b);if(p1&&p2)out+=`<line x1="${p1.x}%" y1="${p1.y}%" x2="${p2.x}%" y2="${p2.y}%" stroke="${c}" stroke-width="3" stroke-dasharray="7 5"/>`});return `<svg class="overlay">${out}</svg>`}
function toolPanel(mode,i=null){return `<div class="panel"><h3>Repère à placer</h3><div class="tools">${Object.entries(tools).map(([k,t])=>`<button class="${state.tool===k?'active':''}" onclick="state.tool='${k}';render()">${t.i} ${t.l}</button>`).join('')}</div><div class="hint" style="margin-top:12px"><b>Rappel :</b> R1/R2 servent seulement à raccorder les photos. Ils ne remplacent pas la longueur du mur.</div></div>`}
function bind(){['client','adresse','date','tech','etat','comment'].forEach(id=>{const e=$(id);if(e)e.oninput=()=>state.project[id]=e.value});document.querySelectorAll('[data-prep]').forEach(c=>c.onchange=()=>{state.prep[c.dataset.prep]=c.checked;render()});const wp=$('wallPhoto');if(wp)wp.onchange=e=>readCompress(e,s=>{state.walls[state.step-2].photos[state.activePart]=s;render()});const tp=$('techPhoto');if(tp)tp.onchange=e=>readCompress(e,s=>{tp.dataset.img=s});const st=$('stage');if(st)st.onclick=placePoint;const m=$('manual');if(m)m.oninput=()=>{let w=state.walls[state.step-2];w.manual=m.value;w.final=m.value;if(m.value)w.needMeasure=false};const am=$('angleMode');if(am)am.onchange=()=>state.walls[state.step-2].angle=am.value;const wn=$('wallNotes');if(wn)wn.oninput=()=>state.walls[state.step-2].notes=wn.value;const no=$('notes');if(no)no.oninput=()=>state.notes=no.value;const re=$('reserve');if(re)re.oninput=()=>state.reserve=re.value;const a4=$('a4Side');if(a4)a4.onchange=()=>{state.walls[state.step-2].a4Side=a4.value;updateA4Estimate(state.step-2);render()}}
function setPhotoMode(i,mode){const w=state.walls[i];w.photoMode=mode;if(mode==='one')state.activePart='left';if(mode==='two'&&!['left','right'].includes(state.activePart))state.activePart='left';if(mode==='three'&&!['left','center','right'].includes(state.activePart))state.activePart='left';if(mode==='hidden'){w.confidence='red';w.needMeasure=true;state.activePart='left'}render()}
function setMeasureMode(i,mode){const w=state.walls[i];w.measureMode=mode;if(mode==='unknown'){w.confidence='red';w.needMeasure=true;w.final='';}if(mode==='segments')updateSegmentTotal(i);if(mode==='a4')updateA4Estimate(i);render()}
function addSegment(i){state.walls[i].segments.push({label:'Segment '+(state.walls[i].segments.length+1),value:''});render()}
function removeSegment(i,idx){state.walls[i].segments.splice(idx,1);if(!state.walls[i].segments.length)state.walls[i].segments.push({label:'Segment 1',value:''});updateSegmentTotal(i);render()}
function updateSegmentTotal(i){const w=state.walls[i];const t=segmentTotal(w);w.final=t?t.toFixed(2):'';if(t)w.needMeasure=false}
function updateA4Estimate(i){const w=state.walls[i];const e=estimateA4(w,true);w.a4Estimate=e?e.toFixed(2):'';if(w.measureMode==='a4'&&e){w.final=w.a4Estimate;w.needMeasure=false}}
function readCompress(e,cb){const f=e.target.files&&e.target.files[0];if(!f)return;loader(true);const reader=new FileReader();reader.onload=()=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height,ratio=Math.min(1,MAX_IMAGE/Math.max(w,h));let cw=Math.round(w*ratio),ch=Math.round(h*ratio);const canvas=document.createElement('canvas');canvas.width=cw;canvas.height=ch;const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,cw,ch);let data=canvas.toDataURL('image/jpeg',QUALITY);loader(false);cb(data)};img.onerror=()=>{loader(false);alert('Photo non lisible par le navigateur. Essaie de la reprendre en JPG.');};img.src=reader.result};reader.readAsDataURL(f)}
function loader(on){$('loader').classList.toggle('on',!!on)}
function placePoint(e){if(e.target.classList.contains('pt'))return;const st=$('stage');if(!st||!st.querySelector('img'))return;const r=st.getBoundingClientRect();let p={type:state.tool,x:((e.clientX-r.left)/r.width*100).toFixed(2),y:((e.clientY-r.top)/r.height*100).toFixed(2),label:''};if(['start','r1','r2','end','hidden','evac','water','elec','hot','gaz','window','door'].includes(p.type)){const note=prompt('Note pour ce repère',tools[p.type].l);if(note===null)return;p.label=note}if(state.step>=2&&state.step<=5){let w=state.walls[state.step-2];p.part=state.activePart;if(['a4a','a4b','m1','m2'].includes(p.type))w.points=w.points.filter(x=>!(x.type===p.type&&x.part===state.activePart));w.points.push(p);updateA4Estimate(state.step-2)}render()}
function delPoint(e,k){e.stopPropagation();let w=state.walls[state.step-2];let pts=w.points.filter(p=>p.part===state.activePart);let target=pts[k];let idx=w.points.indexOf(target);if(idx>=0)w.points.splice(idx,1);updateA4Estimate(state.step-2);render()}
function dist(a,b){return Math.hypot(num(a.x)-num(b.x),num(a.y)-num(b.y))}
function estimateA4(w,raw=false){const pts=w.points.filter(p=>p.part===state.activePart);const a=pts.find(p=>p.type==='a4a'),b=pts.find(p=>p.type==='a4b'),m1=pts.find(p=>p.type==='m1'),m2=pts.find(p=>p.type==='m2');if(!(a&&b&&m1&&m2))return raw?0:'';const known=w.a4Side==='short'?0.21:0.297;const pxRef=dist(a,b);if(!pxRef)return raw?0:'';const val=dist(m1,m2)/(pxRef/known);return raw?val:val.toFixed(2)+' m'}
function segmentTotal(w){const total=w.segments.reduce((s,x)=>s+num(x.value),0);return total>0?total:0}
function finalLen(w){if(w.measureMode==='segments')return segmentTotal(w)?segmentTotal(w).toFixed(2):'';if(w.measureMode==='total')return w.manual||w.final||'';if(w.measureMode==='a4')return w.a4Estimate||w.final||'';return ''}
function confText(w){return w.confidence==='green'?'Fiable':w.confidence==='red'?'Non mesurable':'À confirmer'}function modeLabel(w){return w.photoMode==='one'?'1 photo':w.photoMode==='two'?'2 photos':w.photoMode==='three'?'3 photos':'Zone cachée'}function measureLabel(w){return w.measureMode==='segments'?'Segments':w.measureMode==='unknown'?'Non mesurable':w.measureMode==='a4'?'Estimation A4':'Longueur totale'}function setConf(i,c){state.walls[i].confidence=c;if(c==='red')state.walls[i].needMeasure=true;render()}function markHidden(i){let w=state.walls[i];w.confidence='red';w.needMeasure=true;w.photoMode=w.photoMode==='one'?'hidden':w.photoMode;w.notes=w.notes||'Zone cachée / mesure à confirmer';render()}
function validateWall(i,move){let w=state.walls[i];if(w.measureMode==='segments')updateSegmentTotal(i);if(w.measureMode==='a4')updateA4Estimate(i);if(w.manual&&w.measureMode==='total')w.final=w.manual;if(!finalLen(w)&&w.measureMode!=='unknown'&&w.confidence!=='red')return alert('Il manque une longueur. R1/R2 servent seulement à raccorder les photos. Choisis : longueur totale, segments, estimation A4 ou non mesurable.');w.validated=true;if(move) i<3?go(i+3):go(6);else render()}
function addTechPhoto(){const inp=$('techPhoto');const src=inp&&inp.dataset.img;if(!src)return alert('Ajoute d’abord une photo.');state.techPhotos.push({type:$('techType').value,wall:$('techWall').value,note:$('techNote').value,src});render()}
function planSVG(){let pts=[{x:0,y:0}],x=0,y=0,dir=0;state.walls.forEach(w=>{let L=num(finalLen(w))||1;x+=L*Math.cos(dir*Math.PI/180);y+=L*Math.sin(dir*Math.PI/180);pts.push({x,y});let ang=num(w.angle);dir+=ang||90});let xs=pts.map(p=>p.x),ys=pts.map(p=>p.y),minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys),W=620,H=360,pad=48,sc=Math.min((W-2*pad)/Math.max(.1,maxX-minX),(H-2*pad)/Math.max(.1,maxY-minY)),tx=v=>pad+(v-minX)*sc,ty=v=>H-pad-(v-minY)*sc,out='';for(let i=0;i<pts.length-1;i++){let a=pts[i],b=pts[i+1],w=state.walls[i];out+=`<line x1="${tx(a.x)}" y1="${ty(a.y)}" x2="${tx(b.x)}" y2="${ty(b.y)}" stroke="#10213f" stroke-width="5" stroke-linecap="round"/><text x="${(tx(a.x)+tx(b.x))/2}" y="${(ty(a.y)+ty(b.y))/2-10}" text-anchor="middle" font-size="13" font-weight="900" fill="#172033">Mur ${w.name} - ${esc(finalLen(w)||'?')} m</text>`}let gap=Math.hypot(pts[0].x-pts[pts.length-1].x,pts[0].y-pts[pts.length-1].y);return `<svg viewBox="0 0 ${W} ${H}"><rect width="${W}" height="${H}" fill="#fbfdff"/>${out}${gap>.35?`<text x="20" y="335" fill="#d92d20" font-size="13" font-weight="900">Contour non fermé : ${gap.toFixed(2)} m d’écart. À contrôler.</text>`:''}</svg>`}
function color(t){return {evac:'#d92d20',water:'#06b6d4',elec:'#f59e0b',hot:'#64748b',gaz:'#f97316',window:'#14b8a6',door:'#795548',hidden:'#111827',start:'#16a34a',r1:'#2563eb',r2:'#7c3aed',end:'#ef4444'}[t]||'#1f5eff'}
function facadeSVG(w){let W=460,H=245,pad=34,items='';w.points.filter(p=>['evac','water','elec','hot','gaz','window','door','hidden'].includes(p.type)).forEach(p=>{let t=tools[p.type],x=pad+num(p.x)/100*(W-2*pad),y=pad+num(p.y)/100*(H-2*pad);items+=`<circle cx="${x}" cy="${y}" r="12" fill="${color(p.type)}" stroke="#fff" stroke-width="3"/><text x="${x}" y="${y+4}" text-anchor="middle" font-size="8" font-weight="900" fill="#fff">${t.i}</text><text x="${x}" y="${y-16}" text-anchor="middle" font-size="10" font-weight="800" fill="#172033">${esc(t.l)}</text>`});return `<svg viewBox="0 0 ${W} ${H}"><rect width="${W}" height="${H}" rx="14" fill="#fff" stroke="#dbe3ef"/><line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="#10213f" stroke-width="4"/><text x="${W/2}" y="${H-8}" text-anchor="middle" font-size="12" font-weight="900" fill="#657187">Mur ${w.name} - ${esc(finalLen(w)||'?')} m</text>${items}</svg>`}
function hasEvac(){return state.walls.some(w=>w.points.some(p=>p.type==='evac'))||state.techPhotos.some(p=>p.type==='Évacuation finale')}function defaultReserve(){let hidden=state.walls.filter(w=>w.confidence==='red'||w.measureMode==='unknown'||w.photoMode==='hidden').map(w=>'mur '+w.name).join(', ');return `Le relevé technique a été réalisé avec une méthode photo-guidée basée sur des feuilles A4 utilisées comme repères visibles. Une feuille A4 = un repère : DÉPART, R1, R2, FIN, CACHÉ ou repère technique. Les repères R1/R2 servent uniquement à raccorder plusieurs photos d’un même mur et ne remplacent pas une longueur mesurée.\n\nLes longueurs ont été saisies en longueur totale, calculées par segments, estimées localement avec une feuille A4 ou déclarées à confirmer lorsque la zone n’était pas mesurable.\n\nL’évacuation finale constitue la contrainte prioritaire pour le raccordement de l’évier, du lave-vaisselle et/ou du lave-linge. ${hasEvac()?'Elle a été repérée dans le relevé photo.':'Elle n’a pas été clairement repérée : son emplacement devra être confirmé avant travaux ou après dépose.'}${hidden?'\n\nZones à confirmer : '+hidden+'.':''}`}
function wallPhotosHTML(w){let imgs=Object.entries(w.photos).filter(([k,v])=>v).map(([k,v])=>`<div><b>${photoParts[k]}</b><img src="${v}"></div>`).join('');return imgs?`<div class="reportPhotos">${imgs}</div>`:'<p>Aucune photo mur.</p>'}
function reportHTML(){state.reserve=state.reserve||defaultReserve();let tech=state.techPhotos.map(p=>`<div class="reportBlock"><h3>${esc(p.type)} - ${esc(p.wall)}</h3><img src="${p.src}" style="width:100%;max-height:340px;object-fit:contain;border:1px solid #e5e7eb;border-radius:12px;background:#f3f4f6"><p>${esc(p.note||'')}</p></div>`).join('');return `<div class="reportSheet"><div class="reportTitle"><h2>Relevé technique cuisine</h2><p>${esc(state.project.client||'Client non renseigné')} - ${esc(state.project.adresse||'Adresse non renseignée')}</p></div><div class="reportBody"><div class="reportGrid"><div class="reportBlock"><h3>Infos chantier</h3><div class="kv"><b>Client</b><span>${esc(state.project.client)}</span><b>Adresse</b><span>${esc(state.project.adresse)}</span><b>Date</b><span>${esc(state.project.date)}</span><b>Utilisateur</b><span>${esc(state.project.tech)}</span><b>État</b><span>${esc(state.project.etat)}</span></div></div><div class="reportBlock"><h3>Synthèse</h3><ul><li>Murs renseignés : ${state.walls.filter(w=>finalLen(w)).length}/${state.walls.length}</li><li>Évacuation finale : ${hasEvac()?'repérée':'à confirmer'}</li><li>Photos techniques : ${state.techPhotos.length}</li></ul></div></div><div class="reportBlock"><h3>Vue de dessus</h3>${planSVG()}</div><div class="reportBlock"><h3>Murs</h3><ul>${state.walls.map(w=>`<li><b>Mur ${w.name}</b> : ${esc(finalLen(w)||'à confirmer')} m - mesure : ${measureLabel(w)} - photos : ${modeLabel(w)} - angle après : ${esc(w.angle)} - fiabilité : ${confText(w)}${w.notes?' - '+esc(w.notes):''}${w.measureMode==='segments'&&segmentTotal(w)?' - segments : '+w.segments.map(s=>esc(s.label)+' '+esc(s.value)+' m').join(', '):''}</li>`).join('')}</ul></div><div class="reportGrid">${state.walls.map(w=>`<div class="reportBlock"><h3>Façade mur ${w.name}</h3>${facadeSVG(w)}</div>`).join('')}</div>${state.walls.map(w=>`<div class="reportBlock"><h3>Photos mur ${w.name}</h3>${wallPhotosHTML(w)}</div>`).join('')}${tech?`<div class="reportGrid">${tech}</div>`:''}<div class="reportBlock"><h3>Réserves</h3><p style="white-space:pre-line;line-height:1.45">${esc(state.reserve)}</p></div><div class="reportBlock"><h3>Points à confirmer</h3><p style="white-space:pre-line;line-height:1.45">${esc(state.notes||'Aucun point complémentaire renseigné.')}</p></div></div></div>`}
function saveLocal(){try{localStorage.setItem(STORAGE,JSON.stringify(state));alert('Relevé enregistré dans ce navigateur.')}catch(e){alert('Sauvegarde impossible : trop de photos. Exporte le JSON ou supprime quelques photos.')}}function loadLocal(){let raw=localStorage.getItem(STORAGE);if(!raw)return alert('Aucune sauvegarde.');state=JSON.parse(raw);render()}function exportJSON(){let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='releve_a4_'+(state.project.client||'client').replace(/[^a-zA-Z0-9]+/g,'_')+'.json';a.click();URL.revokeObjectURL(a.href)}function resetAll(){if(confirm('Effacer ce relevé ?')){localStorage.removeItem(STORAGE);state={step:0,tool:'start',activePart:'left',project:{client:'',adresse:'',date:new Date().toISOString().slice(0,10),tech:'',etat:'Cuisine existante en place / encombrée',comment:''},prep:{draw:false,start:false,raccord:false,hidden:false,technical:false,light:false},walls:[],techPhotos:[],notes:'',reserve:''};initWalls();render()}}
render();
</script>
</body>
</html>
